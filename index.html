<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryFlow Editor</title>
  <!-- Base styles (always needed) -->
  <style>
/**
 * StoryFlow Runtime - Base Styles
 * These styles are used by both the editor play mode and exported HTML files.
 */

:root {
  font-family: "Inter", sans-serif;
  color-scheme: dark;
  --dark1: #151515;
  --dark2: #1a1a1a;
  --dark3: #242424;
  --dark4: #2f2f2f;
  --dark5: #383838;
  --dark6: #757575;
  --light1: #efefef;
  --light2: #a0a0a0;
  --light3: #848484;
  --color-purple: #9333ea;
  --sfui-btn-width: 66%;
  --sfui-input-width: 66%;
  --sfui-checkbox-width: 66%;
  --sfui-dropdown-width: 66%;
  /* SFUI overridable properties */
  --sfui-text-color: var(--light1);
  --sfui-text-font-size: inherit;
  --sfui-text-text-align: center;
  --sfui-text-text-transform: none;
  --sfui-text-font-weight: normal;
  --sfui-text-font-style: normal;
  --sfui-text-text-decoration: none;
  --sfui-text-font-family: "Inter", sans-serif;
  --sfui-bg: var(--dark5);
  --sfui-btn-color: white;
  --sfui-btn-bg: var(--dark1);
  --sfui-btn-border: var(--dark1);
  --sfui-btn-font-size: 0.9rem;
  --sfui-btn-text-align: center;
  --sfui-btn-font-family: "Inter", sans-serif;
  --sfui-btn-text-transform: none;
  --sfui-btn-font-weight: normal;
  --sfui-btn-font-style: normal;
  --sfui-btn-text-decoration: none;
  --sfui-btn-hover-color: white;
  --sfui-btn-hover-bg: var(--dark2);
  --sfui-btn-hover-border: var(--dark6);
  --sfui-input-color: var(--light1);
  --sfui-input-bg: var(--dark2);
  --sfui-input-border: var(--dark4);
  --sfui-input-font-size: 0.9rem;
  --sfui-input-text-align: left;
  --sfui-input-font-family: "Inter", sans-serif;
  --sfui-input-font-weight: normal;
  --sfui-input-font-style: normal;
  --sfui-input-text-decoration: none;
  --sfui-input-hover-color: var(--light1);
  --sfui-input-hover-border: var(--dark6);
  --sfui-input-hover-bg: var(--dark2);
  --sfui-checkbox-color: var(--light1);
  --sfui-checkbox-font-size: 0.9rem;
  --sfui-checkbox-font-family: "Inter", sans-serif;
  --sfui-checkbox-text-transform: none;
  --sfui-checkbox-font-weight: normal;
  --sfui-checkbox-font-style: normal;
  --sfui-checkbox-text-decoration: none;
  --sfui-checkbox-justify: center;
  --sfui-checkbox-checked-color: #9333ea;
  --sfui-checkbox-checkmark-color: white;
  --sfui-dropdown-color: var(--light1);
  --sfui-dropdown-bg: var(--dark1);
  --sfui-dropdown-border: var(--dark1);
  --sfui-dropdown-font-size: 0.9rem;
  --sfui-dropdown-font-family: "Inter", sans-serif;
  --sfui-dropdown-font-weight: normal;
  --sfui-dropdown-font-style: normal;
  --sfui-dropdown-text-decoration: none;
  --sfui-dropdown-hover-color: var(--light1);
  --sfui-dropdown-hover-bg: var(--dark2);
  --sfui-dropdown-hover-border: var(--dark6);
  --sfui-dropdown-option-hover-bg: #1a1a1a;
  --sfui-dropdown-option-hover-color: #ffffff;
}

html, body {
  height: 100%;
  margin: 0;
}

body {
  background-color: var(--sfui-bg);
  color: var(--light1);
  -webkit-user-select: none;
  user-select: none;
}

#app {
  min-height: 100%;
  display: flex;
  flex-direction: column;
}

#options-container button {
  font-family: var(--sfui-btn-font-family);
  background-color: var(--sfui-btn-bg);
  cursor: pointer;
  display: block;
  color: var(--sfui-btn-color);
  width: var(--sfui-btn-width);
  border: 2px solid;
  border-color: var(--sfui-btn-border);
  padding: 0.6rem 1rem 0.6rem 1rem;
  white-space: pre-wrap;
  overflow-wrap: break-word;
  word-wrap: break-word;
  font-size: var(--sfui-btn-font-size);
  text-align: var(--sfui-btn-text-align);
  text-transform: var(--sfui-btn-text-transform);
  font-weight: var(--sfui-btn-font-weight);
  font-style: var(--sfui-btn-font-style);
  text-decoration: var(--sfui-btn-text-decoration);
  border-radius: var(--sfui-btn-border-radius, 0.25rem);
}

#options-container button:hover {
  color: var(--sfui-btn-hover-color);
  background-color: var(--sfui-btn-hover-bg);
  border-color: var(--sfui-btn-hover-border);
}

/* Click to Start overlay for standalone mode */
#start-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: var(--sfui-start-bg, rgba(21, 21, 21, 0.95));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: pointer;
}

#start-overlay.hidden {
  display: none;
}

#start-overlay h1 {
  font-size: var(--sfui-start-title-size, 2rem);
  margin-bottom: 1rem;
  color: var(--sfui-start-title-color, var(--light1));
  font-family: var(--sfui-start-title-font, "Inter", sans-serif);
  font-weight: var(--sfui-start-title-weight, bold);
  font-style: var(--sfui-start-title-style, normal);
  text-decoration: var(--sfui-start-title-decoration, none);
  text-transform: var(--sfui-start-title-transform, none);
}

#start-overlay p {
  font-size: var(--sfui-start-subtitle-size, 1rem);
  color: var(--sfui-start-subtitle-color, var(--light2));
  font-family: var(--sfui-start-subtitle-font, "Inter", sans-serif);
  font-weight: var(--sfui-start-subtitle-weight, normal);
  font-style: var(--sfui-start-subtitle-style, normal);
  text-decoration: var(--sfui-start-subtitle-decoration, none);
  text-transform: var(--sfui-start-subtitle-transform, none);
}

#content {
  flex: 1;
  padding: 2.5rem;
  overflow: hidden;
  position: relative;
  z-index: 1;
  justify-content: flex-start !important; /* Override .justify-center to keep content at top */
}

#content::before {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: var(--sfui-overlay, rgba(21, 21, 21, 0.7));
  z-index: -1;
  pointer-events: none;
}

#background-container {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: -2;
  pointer-events: none;
}

.background-image {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-size: var(--sfui-bg-image-fit, cover);
  background-position: var(--sfui-bg-image-position, center);
  background-repeat: no-repeat;
  opacity: 1;
}

.flex {
  display: flex
}

.flex-col {
  flex-direction: column;
}

.gap-2 {
  gap: 0.5rem;
}

.items-center {
  align-items: center;
}

.items-start {
  align-items: flex-start;
}

.justify-center {
  justify-content: center;
}

/* Dialogue container */
#dialogue-container {
  width: 100%;
  box-sizing: border-box;
  max-width: var(--sfui-container-max-width, 600px);
  padding: var(--sfui-container-padding, 0);
  border-radius: var(--sfui-container-border-radius, 0);
  background: var(--sfui-container-bg, transparent);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Character display: image above name */
#character-row {
  display: none;
  flex-direction: var(--sfui-char-layout, column);
  align-items: center;
  gap: 0.5rem;
  width: 100%;
  box-sizing: border-box;
  overflow: hidden;
  background: var(--sfui-char-container-bg, transparent);
  padding: var(--sfui-char-container-padding, 0);
  border-radius: var(--sfui-char-container-border-radius, 0);
}

#character-row.visible {
  display: flex;
}

#character-image {
  width: var(--sfui-char-img-size, 56px);
  height: var(--sfui-char-img-size, 56px);
  border-radius: var(--sfui-char-img-border-radius, 0.5rem);
  object-fit: contain;
  background: var(--sfui-char-img-bg, var(--dark3));
  user-select: none;
  -webkit-user-drag: none;
  max-width: 100%;
  image-rendering: high-quality;
}

#character-image.loaded {
  opacity: 1;
}

#character-image.hidden {
  opacity: 0;
}

#character-name {
  font-size: 1.125rem;
  font-weight: bold;
  color: #efefef;
  min-height: 1.5em;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}

#text-display {
  width: 100%;
  color: var(--sfui-text-color);
  font-size: var(--sfui-text-font-size);
  text-align: var(--sfui-text-text-align);
  text-transform: var(--sfui-text-text-transform);
  font-weight: var(--sfui-text-font-weight);
  font-style: var(--sfui-text-font-style);
  text-decoration: var(--sfui-text-text-decoration);
  font-family: var(--sfui-text-font-family);
  line-height: var(--sfui-text-line-height, 1.6);
  white-space: pre-wrap;
  word-wrap: break-word;
  margin: 0 !important;
}

/* Options */
#options-container {
  width: 100%;
  margin-top: 0.5rem;
}

#options-container button + button {
  margin-top: calc(var(--sfui-btn-gap, 0.5rem) - 0.5rem);
}

/* Input option styles */
.input-option {
  font-family: var(--sfui-input-font-family);
  display: block;
  box-sizing: border-box;
  width: var(--sfui-input-width);
  padding: 0.6rem 1rem;
  background-color: var(--sfui-input-bg);
  border: 2px solid var(--sfui-input-border);
  border-radius: var(--sfui-input-border-radius, 0.25rem);
  color: var(--sfui-input-color);
  font-size: var(--sfui-input-font-size);
  text-align: var(--sfui-input-text-align);
  font-weight: var(--sfui-input-font-weight);
  font-style: var(--sfui-input-font-style);
  text-decoration: var(--sfui-input-text-decoration);
  outline: none;
  transition: border-color 0.15s;
}

.input-option:focus {
  color: var(--sfui-input-hover-color);
  border-color: var(--sfui-input-hover-border);
  background-color: var(--sfui-input-hover-bg);
}

.input-option::placeholder {
  color: var(--light2);
}

.input-option:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Boolean input styles (text + checkbox on same row) */
.boolean-input-container {
  font-family: var(--sfui-checkbox-font-family);
  display: flex;
  align-items: center;
  justify-content: var(--sfui-checkbox-justify);
  gap: 0.75rem;
  width: var(--sfui-checkbox-width);
  padding: 0.6rem 0;
}

.boolean-input-label {
  color: var(--sfui-checkbox-color);
  font-size: var(--sfui-checkbox-font-size);
  font-family: var(--sfui-checkbox-font-family);
  text-transform: var(--sfui-checkbox-text-transform);
  font-weight: var(--sfui-checkbox-font-weight);
  font-style: var(--sfui-checkbox-font-style);
  text-decoration: var(--sfui-checkbox-text-decoration);
}

.boolean-input-checkbox {
  -webkit-appearance: none;
  appearance: none;
  width: 1.125rem;
  height: 1.125rem;
  margin: 0;
  background-color: transparent;
  border: 2px solid var(--dark6);
  border-radius: 0.25rem;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.15s ease;
  position: relative;
}

.boolean-input-checkbox:hover {
  border-color: var(--light2);
}

.boolean-input-checkbox:checked {
  background-color: var(--sfui-checkbox-checked-color);
  border-color: var(--sfui-checkbox-checked-color);
}

.boolean-input-checkbox:checked::after {
  content: '';
  position: absolute;
  left: 4px;
  top: 1px;
  width: 5px;
  height: 8px;
  border: solid var(--sfui-checkbox-checkmark-color);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

.boolean-input-checkbox:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Enum input styles (text + dropdown on same row) */
.enum-input-container {
  font-family: var(--sfui-dropdown-font-family);
  display: flex;
  align-items: center;
  justify-content: var(--sfui-dropdown-justify, center);
  gap: 0.75rem;
  width: var(--sfui-dropdown-width);
  padding: 0.6rem 0;
}

.enum-input-label {
  color: var(--sfui-dropdown-color);
  font-size: var(--sfui-dropdown-font-size);
  font-family: var(--sfui-dropdown-font-family);
  font-weight: var(--sfui-dropdown-font-weight);
  font-style: var(--sfui-dropdown-font-style);
  text-decoration: var(--sfui-dropdown-text-decoration);
}

/* Custom dropdown */
.enum-input-dropdown {
  position: relative;
  min-width: 140px;
}

.enum-input-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.6rem 1rem;
  border-radius: var(--sfui-dropdown-border-radius, 0.25rem);
  border: 2px solid var(--sfui-dropdown-border);
  background-color: var(--sfui-dropdown-bg);
  color: var(--sfui-dropdown-color);
  font-family: var(--sfui-dropdown-font-family);
  font-size: var(--sfui-dropdown-font-size);
  font-weight: var(--sfui-dropdown-font-weight);
  font-style: var(--sfui-dropdown-font-style);
  text-decoration: var(--sfui-dropdown-text-decoration);
  cursor: pointer;
  transition: background-color 0.15s, border-color 0.15s;
  user-select: none;
}

.enum-input-trigger:hover {
  color: var(--sfui-dropdown-hover-color);
  background-color: var(--sfui-dropdown-hover-bg);
  border-color: var(--sfui-dropdown-hover-border);
}

.enum-input-trigger-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.enum-input-trigger-arrow {
  margin-left: 0.5rem;
  flex-shrink: 0;
  opacity: 0.6;
  display: flex;
}

.enum-input-options {
  display: none;
  position: absolute;
  top: calc(100% + 2px);
  left: 0;
  right: 0;
  border-radius: var(--sfui-dropdown-border-radius, 0.25rem);
  border: 2px solid var(--sfui-dropdown-border);
  background-color: var(--sfui-dropdown-bg);
  z-index: 100;
  max-height: 200px;
  overflow-y: auto;
  box-sizing: border-box;
}

.enum-input-dropdown.open .enum-input-options {
  display: block;
}

.enum-input-dropdown.open .enum-input-trigger-arrow {
  transform: rotate(180deg);
}

.enum-input-option {
  padding: 0.5rem 1rem;
  box-sizing: border-box;
  color: var(--sfui-dropdown-color);
  font-family: var(--sfui-dropdown-font-family);
  font-size: var(--sfui-dropdown-font-size);
  cursor: pointer;
  transition: background-color 0.1s;
}

.enum-input-option:hover {
  background-color: var(--sfui-dropdown-option-hover-bg);
  color: var(--sfui-dropdown-option-hover-color);
}

.enum-input-option.selected {
  background-color: var(--sfui-dropdown-option-hover-bg);
  color: var(--sfui-dropdown-option-hover-color);
}

.enum-input-error {
  font-family: "Inter", sans-serif;
  font-size: 0.85rem;
  color: #ef4444;
  font-style: italic;
  padding: 0.5rem 1rem;
  background-color: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.3);
  border-radius: 0.25rem;
}

/* Text option styles (styled like main dialogue text) */
.text-option {
  width: 100%;
  margin: 0;
  padding: 0;
  color: var(--sfui-text-color);
  font-size: var(--sfui-text-font-size);
  text-align: var(--sfui-text-text-align);
  text-transform: var(--sfui-text-text-transform);
  font-weight: var(--sfui-text-font-weight);
  font-style: var(--sfui-text-font-style);
  text-decoration: var(--sfui-text-text-decoration);
  font-family: var(--sfui-text-font-family);
  line-height: var(--sfui-text-line-height, 1.6);
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* Click to advance indicator */
.click-to-advance {
  width: 100%;
  margin: 0;
  padding: 0.5rem 0;
  text-align: center;
  font-size: var(--sfui-click-advance-size, 0.9rem);
  font-family: var(--sfui-click-advance-font, inherit);
  font-weight: var(--sfui-click-advance-weight, normal);
  font-style: var(--sfui-click-advance-style, normal);
  text-decoration: var(--sfui-click-advance-decoration, none);
  text-transform: var(--sfui-click-advance-transform, none);
  color: var(--sfui-click-advance-color, var(--light3));
  animation: pulse-text var(--sfui-click-advance-anim-duration, 2s) ease-in-out infinite;
}

.click-to-advance.no-animation {
  animation: none;
}

@keyframes pulse-text {
  0%, 100% {
    color: var(--sfui-click-advance-color, var(--light3));
  }
  50% {
    color: var(--sfui-click-advance-anim-color-to, var(--light1));
  }
}

/* Volume Control */
#volume-control {
  position: fixed;
  top: 0.75rem;
  left: 0.75rem;
  z-index: 1000;
}

#volume-btn {
  background: #1a1a1a;
  border: 1px solid #2f2f2f;
  color: #efefef;
  padding: 0.5rem;
  border-radius: 0.375rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
}

#volume-btn:hover {
  background: #242424;
  border-color: #383838;
}

#volume-btn svg {
  width: 18px;
  height: 18px;
}

#volume-popup {
  position: absolute;
  top: calc(100% + 0.5rem);
  left: 0;
  background: rgba(26, 26, 26, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid #2f2f2f;
  border-radius: 0.5rem;
  padding: 1rem 0.75rem;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.15s, visibility 0.15s;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}

#volume-control:hover #volume-popup,
#volume-popup:hover {
  opacity: 1;
  visibility: visible;
}

#volume-slider-container {
  width: 24px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#volume-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100px;
  height: 6px;
  background: linear-gradient(to right, #f59e0b 100%, #383838 100%);
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  transform: rotate(-90deg);
}

#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: #efefef;
  border-radius: 50%;
  cursor: pointer;
}

#volume-slider::-webkit-slider-thumb:hover {
  background: #ffffff;
}

#volume-slider::-moz-range-thumb {
  width: 16px;
  height: 16px;
  background: #efefef;
  border-radius: 50%;
  border: none;
  cursor: pointer;
}

#volume-value {
  font-size: 0.75rem;
  color: #a0a0a0;
  text-align: center;
  font-variant-numeric: tabular-nums;
  width: 32px;
}

/* Error Bar - Fixed at bottom of viewport */
#error-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 9998;
  background-color: rgba(26, 26, 26, 0.95);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid #451a1a;
  color: #fca5a5;
  padding: 0.75rem 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  font-size: 0.9rem;
  font-weight: 500;
}

#error-bar.hidden {
  display: none;
}

#error-bar .error-icon {
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  color: #ef4444;
}

#error-message {
  text-align: center;
  white-space: pre-wrap;
  word-wrap: break-word;
  max-width: 80%;
}

</style>
  <!-- Debug styles (editor only - will be removed by export) -->
  <!-- Variable colors from main app -->
  </head>
<body>
<div id="background-container"></div>

<!-- Click to Start overlay (only visible in standalone mode) -->
<div id="start-overlay" class="hidden">
  <h1 id="start-overlay-title">StoryFlow Game</h1>
  <p>Click anywhere to start</p>
</div>

<!-- Volume Control (visible in both editor and standalone modes) -->
<div id="volume-control">
  <button id="volume-btn" title="Volume (click to mute)">
    <svg id="volume-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/>
      <path id="volume-wave-1" d="M16 9a5 5 0 0 1 0 6"/>
      <path id="volume-wave-2" d="M19.364 18.364a9 9 0 0 0 0-12.728"/>
      <path id="volume-mute-x" d="M22 9l-6 6m0-6l6 6" style="display: none;"/>
    </svg>
  </button>

.\n...\nCan we, um... Can we not talk about work for a bit?","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":212},"zIndex":1,"measured":{"width":256,"height":212},"selected":false,"dragging":false},{"id":"5a01915d49024affbf2099b2e8320843","position":{"x":-774,"y":-792},"type":"dialogue","data":{"title":"Dialogue","text":"Of course. What do you want to talk about?","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"82cb5c51f5e141e887af2195587586aa","position":{"x":-504,"y":-792},"type":"dialogue","data":{"title":"Choice","text":"[Conversation topic?]","options":[{"id":"2153775f5e424c04bc20491e12d5c4b9","text":"Thoughts"},{"id":"b6e77739392f411d91ab0386c9348275","text":"Feelings"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":210},"zIndex":1,"measured":{"width":256,"height":210},"selected":false,"dragging":false},{"id":"d2e051da2fcc4c40a14450b752d20a79","position":{"x":-108,"y":-774},"type":"dialogue","data":{"title":"Dialogue","text":"... \nHave you ever thought about what you'd be doing if you didn't work here? Like, what is Sam in another dimension up to?","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLo ":256,"height":212},"selected":false,"dragging":false},{"id":"3d91a0a2f8464360aa6980f258283583","position":{"x":558,"y":-774},"type":"dialogue","data":{"title":"Dialogue","text":"Ooh, ritzy.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"cea53650e8ad4d3e9b436934a7a70c68","position":{"x":558,"y":-504},"type":"dialogue","data":{"title":"Dialogue","text":"...\nDo you... How... Um...\n...\nDo you think of me as just your coworker, or friend? Or...\nOr do you think of me as more than that?","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":266},"zIndex":1,"measured":{"width":256,"height":266},"selected":false,"dragging":false},{"id":"548cee81d2e74e338e6c02631355c301","position":{"x":900,"y":-774},"type":"dialogue","data":{"title":"Dialogue","text":"Mmhmm, a real class joint. I even passed the first two interviews.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":158},"zIndex":1,"measured":{"width":256,"height":158},"selected":false,"dragging":false},{"id":"2bade7ff881440629f8f2f9ffcbba5fa","position":{"x":900,"y":-504},"type":"dialogue","data":{"title":"Dialogue","text":"Um, wow... What a question.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"8d014423bb4846e99ae39fd5aa031235","position":{"x":1206,"y":-504},"type":"dialogue","data":{"title":"Dialogue","text":"Yeah, I... Sorry.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"1ecbffce366d469d81d23cf1550d2b2e","position":{"x":1206,"y":-774},"type":"dialogue","data":{"title":"Dialogue","text":"What stopped you?","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"5470d1ebe02a4bb6b55d2fa1384abed7","position":{"x":1512,"y":-774},"type":"dialogue","data":{"title":"Dialogue","text":"I, uh... I didn't wanna deal with rich people all the time.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"9b870033cf6a492e88db327fd9fa0493","position":{"x":1512,"y":-504},"type":"dialogue","data":{"title":"Dialogue","text":"No, no. Don't be sorry, just uh... Gimme a second.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"268f3c3dca2247f48c884a480eef3bb6","position":{"x":1836,"y":-504},"type":"dialogue","data":{"title":"Dialogue","text":"...\n...\n...","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":284},"zIndex":1,"measured":{"width":256,"height":284},"selected":false,"dragging":false},{"id":"f615bd67d9a6480b9f200e22bac52494","position":{"x":1836,"y":-774},"type":"dialogue","data":{"title":"Dialogue","text":"Heh, yeah... I get that.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":121},"zIndex":1,"measured":{"width":256,"height":121},"selected":false,"dragging":false},{"id":"50bfb59167724375804fcf1e0f42c87d","position":{"x":2124,"y":-504},"type":"dialogue","data":{"title":"Variable","text":"","options":[{"id":"3792c6252e6249ee949bae1004f14e48","text":"[Sam's Opinion > 10]"},{"id":"5b79926a79ae4c84a0921063a345db4e","text":"[Sam's Opinion 5-9]"},{"id":"7b0baf278c654bb98498e2aec492c645","text":"[Sam's Op st with you. \nI really like you, like a lot. but we haven't spent any time together outside of work, so... \nI don't, um, know you? The real you, I mean.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":284},"zIndex":1,"measured":{"width":256,"height":284},"selected":false,"dragging":false},{"id":"8c08524819c24a81a3af71eba6a94700","position":{"x":2484,"y":216},"type":"dialogue","data":{"title":"Dialogue","text":"...\nHonestly dude? I really do like \nyou... \nBut sometimes you make decisions that I just can't get behind. You know what I mean?","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":292,"height":248},"zIndex":1,"measured":{"width":292,"height":248},"selected":false,"dragging":false},{"id":"12d087d165134f6ba054a369f4fb92a1","position":{"x":2520,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"So, if you hadn't chosen here...?","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":230},"zIndex":1,"measured":{"width":256,"height":230},"selected":false,"dragging":false},{"id":"1a43633162c240f39305b2ac693cb35c","position":{"x":2880,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"I guess I'd be working there, and still going absolutely nowhere in life... But I'd be better dressed, at least.\n...\nI dunno, I don't think a lot would change. I don't think I would be using my free time any differently. \nShit, I don't even do anything in my free time now. Pretty much all I do is watch tv and smoke... Cigarettes. All I've ever known is a life of working, all I ever get to spend my time on is working... \nAnd, sure, I'm comfortable, fed... Relatively safe. But I'm not satisfied, or fulfilled. I'm constantly wishing I could experience more of life than I do... And given the odds, I bet every Sam in every dimension is stuck in that same boat.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":580,"height":392},"zIndex":1,"measured":{"width":580,"height":392},"selected":false,"dragging":false},{"id":"b8d41636edee4eb6bf64ce94407e92bb","position":{"x":2880,"y":-486},"type":"dialogue","data":{"title":"Dialogue","text":"I... Yeah. I do feel the same. And I'd really like to find out too.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":176},"zIndex":1,"measured":{"width":256,"height":176},"selected":false,"dragging":false},{"id":"5f6fe513798c417089f37a8eeae4b4aa","position":{"x":2880,"y":-126},"type":"dialogue","data":{"title":"Dialogue","text":"...\nYeah, I know what you mean.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1, ,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":292,"height":248},"zIndex":1,"measured":{"width":292,"height":248},"selected":false,"dragging":false},{"id":"12d087d165134f6ba054a369f4fb92a1","position":{"x":2520,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"So, if you hadn't chosen here...?","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":230},"zIndex":1,"measured":{"width":256,"height":230},"selected":false,"dragging":false},{"id":"1a43633162c240f39305b2ac693cb35c","position":{"x":2880,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"I guess I'd be working there, and still going absolutely nowhere in life... But I'd be better dressed, at least.\n...\nI dunno, I don't think a lot would change. I don't think I would be using my free time any differently. \nShit, I don't even do anything in my free time now. Pretty much all I do is watch tv and smoke... Cigarettes. All I've ever known is a life of working, all I ever get to spend my time on is working... \nAnd, sure, I'm comfortable, fed... Relatively safe. But I'm not satisfied, or fulfilled. I'm constantly wishing I could experience more of life than I do... And given the odds, I bet every Sam in every dimension is stuck in that same boat.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":580,"height":392},"zIndex":1,"measured":{"width":580,"height":392},"selected":false,"dragging":false},{"id":"b8d41636edee4eb6bf64ce94407e92bb","position":{"x":2880,"y":-486},"type":"dialogue","data":{"title":"Dialogue","text":"I... Yeah. I do feel the same. And I'd really like to find out too.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":176},"zIndex":1,"measured":{"width":256,"height":176},"selected":false,"dragging":false},{"id":"5f6fe513798c417089f37a8eeae4b4aa","position":{"x":2880,"y":-126},"type":"dialogue","data":{"title":"Dialogue","text":"...\nYeah, I know what you mean.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"7af292bbb98940b387b9d771008137c1","position":{"x":2880,"y":216},"type":"dialogue","data":{"title":"Dialogue","text":"I... Yeah. I understand.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"b7fe68d31bae4feca25236fe0069aeb2","position":{"x":3240,"y":-486},"type":"dialogue","data":{"title":"Dialogue","text":"Maybe... Maybe once we get past these issues with the Q Boy...\n...\nYou and I could... Go out on a date?","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":292,"height":212},"zIndex":1,"measured":{"width":292,"height":212},"selected":false,"dragging":false},{"id":"e5360b773408480bb83939ed981a5d4a","position":{"x":3240,"y":-126},"type":"dialogue","data":{"title":"Dialogue","text":"But, um... That doesn't mean I'm uninterested in getting to know the real you... I would really like to, actually... Maybe after we get past all of the issues with the Q Boy?","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":292,"height":230},"zIndex":1,"measured":{"width":292,"height":230},"selected":false,"dragging":false},{"id":"ef0de9f858164f4a94bb8f7d56e2904e","position":{"x":3240,"y":216},"type":"dialogue","data":{"title":"Dialogue","text":"...\nUm... Do you have anything else you want to say about that?","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":292,"height":194},"zIndex":1,"measured":{"width":292,"height":194},"selected":false,"dragging":false},{"id":"6400796895c4461899f2c1ed8b589708","position":{"x":3600,"y":-486},"type":"dialogue","data":{"title":"Dialogue","text":"I'd love to.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elemen  Maybe? I don't really think there's any version of me that is capable of something like that.\nThis version of me can't even force herself to work full-time hours because she doesn't feel like it's worth the time or energy.\n...\nIs it worth it?","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":356},"zIndex":1,"measured":{"width":256,"height":356},"selected":false,"dragging":false},{"id":"fcbddf9cbc43437e84680533e0005cef","position":{"x":4320,"y":-954},"type":"dialogue","data":{"title":"Choice","text":"[Is it worth it?]","options":[{"id":"36685f774102470e9cffcb4662b1468a","text":"Yes"},{"id":"3cb46e38cedc483fbbfc8d8f523849ea","text":"No"}],"image":"","imageReset":false,"character":"","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":210},"zIndex":1,"measured":{"width":256,"height":210},"selected":false,"dragging":false},{"id":"87151e28f20d46369b70d4ea69cab775","position":{"x":4680,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"Yeah? I think it is, at least. I get a big place to myself, and if I want or need something, I'm almost always able to get it.\n...\nI don't really get a lot of time to myself to enjoy it, though. But it beats the alternative.\nI don't know how you stand living in that tiny little apartment in the city.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":364," :{"x":5130,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"I don't either... And it's no good for Mr. Millionaire, either, to be cooped up like that...\n...\nBut the more I work, the worse my mental health gets. I don't know what other options I have...","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":274,"height":266},"zIndex":1,"measured":{"width":274,"height":266},"selected":false,"dragging":false},{"id":"f39211aaa89c42e4a6cac002b2367878","position":{"x":5490,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"...\nI don't know what to say.","options":[],"image":"","imageReset":false,"character":"Clerk.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"b42700e9b4a040bd8aff31d8f16b248b","position":{"x":5850,"y":-954},"type":"dialogue","data":{"title":"Dialogue","text":"It's okay, you don't have to say anything.","options":[],"image":"","imageReset":false,"character":"Sam.sfc","audio":"","audioLoop":false,"audioReset":false,"audioAdvanceOnEnd":false,"audioAllowSkip":false,"imageUseVarInput":false,"characterUseVarInput":false,"audioUseVarInput":false,"textBlocks":[],"elements":[]},"style":{"width":256,"height":140},"zIndex":1,"measured":{"width":256,"height":140},"selected":false,"dragging":false},{"id":"3105539f2392429c971101f6be1dea8b","position":{"x":4320,"y":216},"type":"dialogue","data":{"title":"Dialogue","text":"...\nUm, change of subject, but...\n...\nCould I bum a cigarette off of you?","options":[],"image":"","im     // Load each character file
    const paths = Object.keys(characterPaths);
    for (let j = 0; j < paths.length; j++) {
      const characterPath = paths[j];
      const normalizedPath = characterPath.replace(/\\/g, '/').trim();
      const cleanPath = normalizedPath.replace(/^\/+/, '');
      const lookupKey = cleanPath.toLowerCase().replace(/\//g, '\\');

      // Skip if already cached
      if (SFR.characterDataCache[lookupKey]) {
        continue;
      }

      try {
        const fullPath = projectContentPath.replace(/\\/g, '/') + '/' + cleanPath;
        const data = await window.api.readJsonFile(fullPath);
        if (data) {
          SFR.characterDataCache[lookupKey] = data;
        }
      } catch (error) {
        console.warn('Failed to pre-load character data:', characterPath, error);
      }
    }
  };

  SFR.loadCharacterData = async function(characterPath) {
    if (!characterPath || characterPath.trim() === '') {
      return null;
    }

    const normalizedPath = characterPath.replace(/\\/g, '/').trim();
    const cleanPath = normalizedPath.replace(/^\/+/, '');

    const fileName = cleanPath.split('/').pop() || '';
    const fallbackName = fileName.replace(/\.[^/.]+$/, '');

    try {
      let characterData;
      let imageDataUrl = null;

      if (SFR.isStandalone()) {
        const gameData = window.EMBEDDED_GAME_DATA;
        if (gameData && gameData.allCharacters) {
          const lookupKey = cleanPath.toLowerCase().replace(/\//g, '\\');
          characterData = gameData.allCharacters[lookupKey];
        }

        if (!characterData) {
          console.warn('Character not found in embedded data:', cleanPath);
          return { name: fallbackName, imagePath: null, imageDataUrl: null };
        }

        if (characterData.image) {
          const imagePath = characterData.image.replace(/\\/g, '/').replace(/^\/+/, '');
          imageDataUrl = 'assets/' + imagePath;
        }
      } else {
        const gameInstance = window.storyFlowGameInstance;
        if (gameInstance && gameInstance.projectContentPath && window.api) {
          const fullPath = gameInstance.projectContentPath.replace(/\\/g, '/') + '/' + cleanPath;
          const lookupKey = cleanPath.toLowerCase().replace(/\//g, '\\');

          // Check cache first - this preserves runtime changes made by SetCharacterVariable
          if (SFR.characterDataCache[lookupKey]) {
            characterData = SFR.characterDataCache[lookupKey];
          } else {
            // Load from disk and cache it
            characterData = await window.api.readJsonFile(fullPath);
            SFR.characterDataCache[lookupKey] = characterData;
          }

          if (characterData.image) {
            const charImagePath = characterData.image.replace(/\\/g, '/').replace(/^\/+/, '');
            const fullImagePath = gameInstance.projectContentPath.replace(/\\/g, '/') + '/' + charImagePath;
            try {
              imageDataUrl = await window.api.loadImageDataUrl(fullImagePath);
            } catch (imgError) {
              console.warn('Failed to load character image:', imgError);
            }
          }
        }
      }

      return {
        name: characterData?.name || fallbackName,
        imagePath: characterData?.image || null,
        imageDataUrl: imageDataUrl,
        characterPath: cleanPath,
        variables: characterData?.variables || []
      };
    } catch (error) {
      console.warn('Failed to load character data:', error);
      return { name: fallbackName, imagePath: null, imageDataUrl: null, characterPath: cleanPath, variables: [] };
    }
  };

  // ============================================================================
  // AUDIO MANAGEMENT
  // ============================================================================

  // Audio state - accessible via SFR namespace
  SFR.currentAudioElement = null;
  SFR.hasUserInteracted = false;
  SFR.pendingAudioPath = null;
  SFR.audioLoadId = 0;

  // Start overlay management
  const startOverlay = document.getElementById('start-overlay');
  const startOverlayTitle = document.getElementById('start-overlay-title');

  SFR.showStartOverlay = function() {
    if (SFR.isStandalone() && startOverlay) {
      const gameData = window.EMBEDDED_GAME_DATA;
      if (gameData?.projectName && startOverlayTitle) {
        startOverlayTitle.textContent = gameData.projectName;
      }
      startOverlay.classList.remove('hidden');
    }
  };

  SFR.hideStartOverlay = function() {
    if (startOverlay) {
      startOverlay.classList.add('hidden');
    }
  };

  SFR.markUserInteraction = function() {
    if (SFR.hasUserInteracted) return;
    SFR.hasUserInteracted = true;

    SFR.hideStartOverlay();

    if (SFR.pendingAudioPath) {
      const audioToPlay = SFR.pendingAudioPath;
      SFR.pendingAudioPath = null;
      SFR.playDialogueAudio(audioToPlay);
    }
  };

  // Set up start overlay click handler
  if (startOverlay) {
    startOverlay.addEventListener('click', SFR.markUserInteraction);
  }

  // Also listen for other interactions
  ['click', 'keydown', 'touchstart'].forEach(function(event) {
    document.addEventListener(event, SFR.markUserInteraction, { once: true });
  });

  // In standalone mode: show overlay and wait for click
  // In editor mode: enable audio immediately (user already clicked Play)
  if (SFR.isStandalone()) {

      SFR.currentAudioElement.currentTime = 0;
      SFR.currentAudioElement = null;

    if (!audioPath || audioPath.trim() === '') {
      SFR.pendingAudioPath = null;
      return;
    }

    if (!SFR.hasUserInteracted) {
      SFR.pendingAudioPath = audioPath;
      return;
    }

    const normalizedPath = audioPath.replace(/\\/g, '/').trim();
    const cleanPath = normalizedPath.replace(/^\/+/, '');

    let audioUrl;
    if (SFR.isStandalone()) {
      audioUrl = 'assets/' + cleanPath;
    } else {
      const gameInstance = window.storyFlowGameInstance;
      if (gameInstance && gameInstance.projectContentPath && window.api && window.api.loadAudioDataUrl) {
        try {
          const fullPath = gameInstance.projectContentPath.replace(/\\/g, '/') + '/' + cleanPath;
          audioUrl = await window.api.loadAudioDataUrl(fullPath);
          if (thisLoadId !== SFR.audioLoadId) {
            return;
          }
        } catch (error) {
          console.error('Failed to load audio:', error);
          return;
        }
      } else {
        audioUrl = cleanPath;
      }
    }

    const audio = new Audio(audioUrl);
    audio.loop = loop;
    audio.volume = window.isMuted ? 0 : (window.currentVolume || 1.0);

    audio.addEventListener('error', function(e) {
      console.error('Audio playback error:', e);
      // Trigger onEnded on error so advance-on-end doesn't leave the player stuck
      if (typeof onEnded === 'function' && SFR.currentAudioElement === audio) {
        onEnded();
      }
    });

    audio.addEventListener('ended', function() {
      if (timeEl && audio.duration) {
        const durationFormatted = SFR.formatAudioTime(audio.duration);
        timeEl.textContent = durationFormatted + ' / ' + durationFormatted;
      }
      if (typeof onEnded === 'function' && SFR.currentAudioElement === audio) {
        onEnded();
      }
    });

    if (!SFR.isStandalone()) {
      audio.addEventListener('timeupdate', function() {
        if (timeEl && audio.duration) {
          const currentFormatted = SFR.formatAudioTime(audio.currentTime);
          const durationFormatted = SFR.formatAudioTime(audio.duration);
          timeEl.textContent = currentFormatted + ' / ' + durationFormatted;

        if (timeEl && audio.duration) {
          const durationFormatted = SFR.formatAudioTime(audio.duration);
          timeEl.textContent = '0:00 / ' + durationFormatted;
        }
      });
    }

    if (thisLoadId !== SFR.audioLoadId) {
      return;
    }

    SFR.currentAudioElement = audio;

    try {
      await audio.play();
    } catch (error) {
      console.warn('Audio playback failed:', error);
      if (SFR.currentAudioElement === audio) {
        SFR.currentAudioElement = null;
        // Trigger onEnded on playback failure so advance-on-end doesn't leave the player stuck
        if (typeof onEnded === 'function') {
          onEnded();
        }
      }
    }

  if (!SFR.isStandalone()) {
  }

/**
 * StoryFlow Runtime - Volume Control
 * Handles volume slider, mute functionality, and persistence.
 * Depends on: runtime-constants.js, runtime-media.js
 */

(function(SFR) {
  'use strict';

  // ============================================================================
  // VOLUME STATE (on window for global access)
  // ============================================================================

  window.currentVolume = 1.0;
  window.isMuted = false;
  window.volumeBeforeMute = 1.0;

  // ============================================================================
  // SHARED HELPER FUNCTIONS
  // ============================================================================

  // Cache DOM element references (populated on first use)
  let volumeElements = null;

  function getVolumeElements() {
    if (!volumeElements) {
      volumeElements = {
        slider: document.getElementById('volume-slider'),
        valueEl: document.getElementById('volume-value'),
        volumeBtn: document.getElementById('volume-btn'),
        wave1: document.getElementById('volume-wave-1'),
        wave2: document.getElementById('volume-wave-2'),
        muteX: document.getElementById('volume-mute-x'),
      };
    }
    return volumeElements;
  }

  function updateVolumeIcon(vol, muted) {
    const els = getVolumeElements();
    if (els.wave1 && els.wave2 && els.muteX) {
      if (muted || vol === 0) {
        els.wave1.style.display = 'none';
        els.wave2.style.display = 'none';
        els.muteX.style.display = 'block';
      } else if (vol < 50) {
        els.wave1.style.display = 'block';
        els.wave2.style.display = 'none';
        els.muteX.style.display = 'none';
      } else {
        els.wave1.style.display = 'block';
        els.wave2.style.display = 'block';
        els.muteX.style.display = 'none';
      }
    }
  }

  function updateButtonTitle(muted) {
    const els = getVolumeElements();
    if (els.volumeBtn) {
      els.volumeBtn.title = muted ? 'Volume (click to unmute)' : 'Volume (click to mute)';
    }
  }

  function updateSliderGradient(vol) {
    const els = getVolumeElements();
    const gradient = 'linear-gradient(to right, #f59e0b ' + vol + '%, #1a1a1a ' + vol + '%)';
    if (els.slider) {
      els.slider.style.background = gradient;
    }
  }

  function syncAllControls(vol) {
    const els = getVolumeElements();
    if (els.slider) els.slider.value = vol;
    if (els.valueEl) els.valueEl.textContent = vol + '%';
    updateSliderGradient(vol);
  }

  // ============================================================================
  // VOLUME CONTROL INITIALIZATION
  // ============================================================================

  SFR.initVolumeControl = function() {
    const els = getVolumeElements();
    if (!els.slider) return;

    const handleVolumeChange = function(vol) {
      window.currentVolume = vol / 100;
      window.volumeBeforeMute = window.currentVolume;
      window.isMuted = false;

      syncAllControls(vol);

      localStorage.setItem('storyflow-volume', vol);
      localStorage.setItem('storyflow-muted', 'false');

      if (SFR.currentAudioElement) {
        SFR.currentAudioElement.volume = window.currentVolume;
      }

      updateVolumeIcon(vol, false);
      updateButtonTitle(false);

      // Notify editor to persist volume (Electron mode only)
      if (!SFR.isStandalone() && window?.electron?.ipcRenderer) {
        window.electron.ipcRenderer.send('volume-changed', vol, false);
      }
    };

    // Load from localStorage for initial state (standalone mode uses this permanently,
    // Electron mode will override via applyEditorVolumeSettings after load-content)
    const storedVolume = localStorage.getItem('storyflow-volume');
    const savedVolume = storedVolume !== null ? parseInt(storedVolume, 10) : null;
    const savedMuted = localStorage.getItem('storyflow-muted') === 'true';

    if (savedVolume !== null) {
      const vol = savedVolume;
      els.slider.value = vol;
      window.currentVolume = vol / 100;
      window.volumeBeforeMute = window.currentVolume;
      if (els.valueEl) els.valueEl.textContent = vol + '%';
    }

    if (savedMuted) {
      window.isMuted = true;
      window.currentVolume = 0;
      updateVolumeIcon(0, true);
      updateButtonTitle(true);
      updateSliderGradient(0);
    } else {
      const initialVol = parseInt(els.slider.value, 10);
      updateVolumeIcon(initialVol, false);
      updateSliderGradient(initialVol);
    }

    if (els.volumeBtn) {
      els.volumeBtn.addEventListener('click', function(e) {
        if (e.target.closest('#volume-popup')) return;

        window.isMuted = !window.isMuted;

        if (window.isMuted) {
          window.volumeBeforeMute = parseInt(els.slider.value, 10) / 100;
          window.currentVolume = 0;
          localStorage.setItem('storyflow-muted', 'true');
        } else {
          window.currentVolume = window.volumeBeforeMute;
          localStorage.setItem('storyflow-muted', 'false');
        }

        if (SFR.currentAudioElement) {
          SFR.currentAudioElement.volume = window.currentVolume;
        }

        updateVolumeIcon(window.isMuted ? 0 : parseInt(els.slider.value, 10), window.isMuted);
        updateButtonTitle(window.isMuted);
        updateSliderGradient(window.isMuted ? 0 : parseInt(els.slider.value, 10));

        // Notify editor to persist mute state (Electron mode only)
        if (!SFR.isStandalone() && window?.electron?.ipcRenderer) {
          window.electron.ipcRenderer.send('volume-changed', parseInt(els.slider.value, 10), window.isMuted);
        }
      });
    }

    els.slider.addEventListener('input', function() {
      handleVolumeChange(parseInt(this.value, 10));
    });


    const volumeControl = document.getElementById('volume-control');
    if (volumeControl) {
      volumeControl.addEventListener('wheel', function(e) {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -5 : 5;
        let newVol = parseInt(els.slider.value, 10) + delta;
        newVol = Math.max(0, Math.min(100, newVol));
        handleVolumeChange(newVol);
      }, { passive: false });
    }
  };

  // ============================================================================
  // APPLY EDITOR VOLUME SETTINGS (called after load-content in Electron mode)
  // ============================================================================

  SFR.applyEditorVolumeSettings = function(volumeSettings) {
    if (!volumeSettings) return;

    const els = getVolumeElements();
    if (!els.slider) return;

    const vol = volumeSettings.volume;
    const muted = volumeSettings.muted;

    // Apply volume value to UI
    els.slider.value = vol;
    if (els.valueEl) els.valueEl.textContent = vol + '%';

    // Apply mute state
    if (muted) {
      window.isMuted = true;
      window.volumeBeforeMute = vol / 100;
      window.currentVolume = 0;
      updateVolumeIcon(0, true);
      updateSliderGradient(0);
      updateButtonTitle(true);
    } else {
      window.isMuted = false;
      window.currentVolume = vol / 100;
      window.volumeBeforeMute = window.currentVolume;
      updateVolumeIcon(vol, false);
      updateSliderGradient(vol);
      updateButtonTitle(false);
    }

    // Apply to any playing audio
    if (SFR.currentAudioElement) {
      SFR.currentAudioElement.volume = window.currentVolume;
    }
  };

  // Also expose on window for backward compatibility
  window.initVolumeControl = SFR.initVolumeControl;
  window.applyEditorVolumeSettings = SFR.applyEditorVolumeSettings;

  // Initialize volume control on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', SFR.initVolumeControl);
  } else {
    SFR.initVolumeControl();
  }

})(window.StoryFlowRuntime);

/**
 * StoryFlow Runtime - Type Evaluators
 * Methods for evaluating boolean, integer, float, and string values from nodes.
 * These are mixed into StoryFlowEditor prototype.
 * Depends on: runtime-constants.js, runtime-utils.js
 */

(function(SFR) {
  'use strict';

  // ============================================================================
  // EVALUATOR METHODS (to be mixed into StoryFlowEditor.prototype)
  // ============================================================================

  SFR.EvaluatorMethods = {

    // ============================================================================
    // BOOLEAN EVALUATION
    // ============================================================================

    evaluateBooleanFromNode: function(node, targetNodeId, sourceHandle) {
      if (!node) return false;

      switch (node.type) {
        case 'dialogue': {
          // Get input value from dialogue option (convert to boolean)
          var inputData = SFR.getDialogueInputValue(node, targetNodeId, sourceHandle, this.gameState.edges);
          if (inputData) {
            var val = inputData.value;
            if (typeof val === 'number') return val !== 0;
            if (typeof val === 'string') return val !== '' && val !== '0' && val.toLowerCase() !== 'false';
            return Boolean(val);
          }
          return false;
        }

        case 'getCharacterVar':
        case 'setCharacterVar': {
          if (node.data?.variableType === 'boolean') {
            // First check for connected character input handle, then fall back to dropdown value
            const characterPath = this.getCharacterInput(node, 'character-character-input', node.data.characterPath || '');
            const value = SFR.getCharacterVariableValue(
              characterPath,
              node.data.variableName,
              'boolean'
            );
            return typeof value === 'boolean' ? value : false;
          }
          return false;
        }

        case 'getBool':
        case 'setBool': {
          if (SFR.isValidNodeData(node.data)) {
            const isGlobal = node.data.isGlobal === true;
            const variableArray = isGlobal ? this.gameState.globalVariables : this.gameState.variables;
            const variable = SFR.findVariableByName(variableArray, node.data.variableName);
            return variable ? variable.value : false;
          }
          return false;
        }

        case 'notBool': {
          const notBoolEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes(node.id + '-boolean');
          });
          const sourceNode = notBoolEdge ? SFR.findNodeById(this.gameState.nodes, notBoolEdge.source) : null;
          if (!sourceNode) return false;
          return !this.evaluateBooleanFromNode(sourceNode, node.id, notBoolEdge.sourceHandle);
        }

        case 'branch': {
          const conditionEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-condition');
          });
          if (conditionEdge) {
            const branchSourceNode = SFR.findNodeById(this.gameState.nodes, conditionEdge.source);
            if (branchSourceNode) {
              return this.evaluateBooleanFromNode(branchSourceNode, node.id, conditionEdge.sourceHandle);
            }
          }
          return typeof node.data?.value === 'boolean' ? node.data.value : false;
        }

        case 'andBool': {
          let input1Value = false;
          const input1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-1');
          });
          if (input1Edge) {
            const source1Node = SFR.findNodeById(this.gameState.nodes, input1Edge.source);
            if (source1Node) input1Value = this.evaluateBooleanFromNode(source1Node, node.id, input1Edge.sourceHandle);
          } else if (typeof node.data?.value1 === 'boolean') {
            input1Value = node.data.value1;
          }

          let input2Value = false;
          const input2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-2');
          });
          if (input2Edge) {
            const source2Node = SFR.findNodeById(this.gameState.nodes, input2Edge.source);
            if (source2Node) input2Value = this.evaluateBooleanFromNode(source2Node, node.id, input2Edge.sourceHandle);
          } else if (typeof node.data?.value2 === 'boolean') {
            input2Value = node.data.value2;
          }

          return input1Value && input2Value;
        }

        case 'orBool': {
          let orInput1Value = false;
          const orInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-1');
          });
          if (orInput1Edge) {
            const orSource1Node = SFR.findNodeById(this.gameState.nodes, orInput1Edge.source);
            if (orSource1Node) orInput1Value = this.evaluateBooleanFromNode(orSource1Node, node.id, orInput1Edge.sourceHandle);
          } else if (typeof node.data?.value1 === 'boolean') {
            orInput1Value = node.data.value1;
          }

          let orInput2Value = false;
          const orInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-2');
          });
          if (orInput2Edge) {
            const orSource2Node = SFR.findNodeById(this.gameState.nodes, orInput2Edge.source);
            if (orSource2Node) orInput2Value = this.evaluateBooleanFromNode(orSource2Node, node.id, orInput2Edge.sourceHandle);
          } else if (typeof node.data?.value2 === 'boolean') {
            orInput2Value = node.data.value2;
          }

          return orInput1Value || orInput2Value;
        }

        case 'equalBool': {
          let equalInput1Value = false;
          const equalInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-1');
          });
          if (equalInput1Edge) {
            const equalSource1Node = SFR.findNodeById(this.gameState.nodes, equalInput1Edge.source);
            if (equalSource1Node) equalInput1Value = this.evaluateBooleanFromNode(equalSource1Node, node.id, equalInput1Edge.sourceHandle);
          } else if (typeof node.data?.value1 === 'boolean') {
            equalInput1Value = node.data.value1;
          }

          let equalInput2Value = false;
          const equalInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-2');
          });
          if (equalInput2Edge) {
            const equalSource2Node = SFR.findNodeById(this.gameState.nodes, equalInput2Edge.source);
            if (equalSource2Node) equalInput2Value = this.evaluateBooleanFromNode(equalSource2Node, node.id, equalInput2Edge.sourceHandle);
          } else if (typeof node.data?.value2 === 'boolean') {
            equalInput2Value = node.data.value2;
          }

          return equalInput1Value === equalInput2Value;
        }

        case 'greaterThan':
        case 'greaterThanOrEqual':
        case 'lessThan':
        case 'lessThanOrEqual':
        case 'equalInt':
        case 'greaterThanFloat':
        case 'greaterThanOrEqualFloat':
        case 'lessThanFloat':
        case 'lessThanOrEqualFloat':
        case 'equalFloat':
          return node.data?.outputValue || false;

        case 'intToBoolean': {
          const intToBoolInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-');
          });
          if (intToBoolInputEdge) {
            const intSourceNode = SFR.findNodeById(this.gameState.nodes, intToBoolInputEdge.source);
            const intValue = intSourceNode ? this.evaluateIntegerFromNode(intSourceNode, node.id, intToBoolInputEdge.sourceHandle) : 0;
            return intValue !== 0;
          }
          return false;
        }

        case 'floatToBoolean': {
          const floatToBoolInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-');
          });
          if (floatToBoolInputEdge) {
            const floatSourceNode = SFR.findNodeById(this.gameState.nodes, floatToBoolInputEdge.source);
            const floatValue = floatSourceNode ? this.evaluateFloatFromNode(floatSourceNode, node.id, floatToBoolInputEdge.sourceHandle) : 0.0;
            return floatValue !== 0.0;
          }
          return false;
        }

        // Array contains returns boolean - compute directly since these are pure nodes
        case 'arrayContainsBool': {
          const containsBoolArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          const containsBoolVal = this.getBooleanInput(node, 'boolean-2', typeof node.data?.value === 'boolean' ? node.data.value : false);
          return containsBoolArr.includes(containsBoolVal);
        }
        case 'arrayContainsInt': {
          const containsIntArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          const containsIntVal = this.getIntegerInput(node, 'integer-2', typeof node.data?.value === 'number' ? node.data.value : 0);
          return containsIntArr.includes(containsIntVal);
        }
        case 'arrayContainsFloat': {
          const containsFloatArr = this.getArrayInput(node, 'float-array-1', 'float');
          const containsFloatVal = this.getFloatInput(node, 'float-2', typeof node.data?.value === 'number' ? node.data.value : 0.0);
          return containsFloatArr.some(function (v) { return Math.abs(v - containsFloatVal) < 1e-6; });
        }
        case 'arrayContainsString': {
          const containsStrArr = this.getArrayInput(node, 'string-array-1', 'string');
          const containsStrVal = this.getStringInput(node, 'string-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return containsStrArr.includes(containsStrVal);
        }
        case 'arrayContainsImage': {
          const containsImgArr = this.getArrayInput(node, 'image-array-1', 'image');
          const containsImgVal = this.getImageInput(node, 'image-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return containsImgArr.includes(containsImgVal);
        }
        case 'arrayContainsCharacter': {
          const containsCharArr = this.getArrayInput(node, 'character-array-1', 'character');
          const containsCharVal = this.getCharacterInput(node, 'character-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return containsCharArr.includes(containsCharVal);
        }
        case 'arrayContainsAudio': {
          const containsAudioArr = this.getArrayInput(node, 'audio-array-1', 'audio');
          const containsAudioVal = this.getAudioInput(node, 'audio-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return containsAudioArr.includes(containsAudioVal);
        }

        // Get boolean array element - compute directly since this is a pure node
        case 'getBoolArrayElement': {
          const getBoolElemArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          const getBoolElemIdx = this.getIntegerInput(node, 'integer-2', node.data?.index || 0);
          return (getBoolElemIdx >= 0 && getBoolElemIdx < getBoolElemArr.length) ? getBoolElemArr[getBoolElemIdx] : false;
        }

        // Get random boolean array element - return element value
        case 'getRandomBoolArrayElement': {
          const randBoolArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          if (randBoolArr.length === 0) return false;
          const randBoolIdx = Math.floor(Math.random() * randBoolArr.length);
          return randBoolArr[randBoolIdx];
        }

        // ForEach loop element (boolean)
        case 'forEachBoolLoop':
          return node.data?.outputValue || false;

        case 'runScript': {
          if (!node.data || !node.data._outputValues) return false;
          var outMatch = sourceHandle ? sourceHandle.match(/-out-(.+)$/) : null;
          if (!outMatch) return false;
          var outData = node.data._outputValues[outMatch[1]];
          if (!outData) return false;
          var val = outData.value;
          if (typeof val === 'boolean') return val;
          if (typeof val === 'number') return val !== 0;
          if (typeof val === 'string') return val !== '' && val !== '0' && val.toLowerCase() !== 'false';
          return Boolean(val);
        }

        case 'equalString': {
          const equalStr1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-1');
          });
          let strValue1;
          if (equalStr1Edge) {
            const strSource1Node = SFR.findNodeById(this.gameState.nodes, equalStr1Edge.source);
            strValue1 = strSource1Node ? this.evaluateStringFromNode(strSource1Node, node.id, equalStr1Edge.sourceHandle) : '';
          } else {
            strValue1 = (node.data?.value1 !== undefined ? node.data.value1 : node.value1) || '';
          }

          const equalStr2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-2');
          });
          let strValue2;
          if (equalStr2Edge) {

          } else {
            strValue2 = (node.data?.value2 !== undefined ? node.data.value2 : node.value2) || '';
          }

        }

        case 'containsString': {
          const containsStr1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-1');
          });
          let containsValue1;
          if (containsStr1Edge) {
            const containsSource1Node = SFR.findNodeById(this.gameState.nodes, containsStr1Edge.source);
            containsValue1 = containsSource1Node ? this.evaluateStringFromNode(containsSource1Node, node.id, containsStr1Edge.sourceHandle) : '';
          } else {
