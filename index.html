          } else {
            containsValue2 = (node.data?.value2 !== undefined ? node.data.value2 : node.value2) || '';
          }

          return containsValue1.includes(containsValue2);
        }

        case 'equalEnum': {
          const equalEnum1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-enum-1');
          });
          let enumValue1;
          if (equalEnum1Edge) {
            const enumSource1Node = SFR.findNodeById(this.gameState.nodes, equalEnum1Edge.source);
            enumValue1 = enumSource1Node ? this.evaluateEnumFromNode(enumSource1Node, node.id, equalEnum1Edge.sourceHandle) : '';
          } else {
            enumValue1 = (node.data?.value1 !== undefined ? String(node.data.value1) : '') || '';
          }

          const equalEnum2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-enum-2');
          });
          let enumValue2;
          if (equalEnum2Edge) {
            const enumSource2Node = SFR.findNodeById(this.gameState.nodes, equalEnum2Edge.source);
            enumValue2 = enumSource2Node ? this.evaluateEnumFromNode(enumSource2Node, node.id, equalEnum2Edge.sourceHandle) : '';
          } else {
            enumValue2 = (node.data?.value2 !== undefined ? String(node.data.value2) : '') || '';
          }

          return enumValue1 === enumValue2;
        }

        default:
          return false;
      }
    },

    // ============================================================================
    // INTEGER EVALUATION
    // ============================================================================

    evaluateIntegerFromNode: function(node, targetNodeId, sourceHandle) {
      if (!node) return 0;

      switch (node.type) {
        case 'dialogue': {
          // Get input value from dialogue option
          var inputData = SFR.getDialogueInputValue(node, targetNodeId, sourceHandle, this.gameState.edges);
          if (inputData) {
            return parseInt(inputData.value, 10) || 0;
          }
          return 0;
        }

        case 'getCharacterVar':
        case 'setCharacterVar': {
          if (node.data?.variableType === 'integer') {
            // First check for connected character input handle, then fall back to dropdown value
            const characterPath = this.getCharacterInput(node, 'character-character-input', node.data.characterPath || '');
            const value = SFR.getCharacterVariableValue(
              characterPath,
              node.data.variableName,
              'integer'
            );
            return typeof value === 'number' ? value : 0;
          }
          return 0;
        }

        case 'getInt':
        case 'setInt': {
          if (SFR.isValidNodeData(node.data)) {
            const isGlobal = node.data.isGlobal === true;
            const variableArray = isGlobal ? this.gameState.globalVariables : this.gameState.variables;
            const variable = SFR.findVariableByName(variableArray, node.data.variableName);
            return variable ? variable.value : 0;
          }
          return 0;
        }

        case 'plus': {
          const plusInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-1');
          });
          const plusInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const plusInput1 = plusInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, plusInput1Edge.source), node.id, plusInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const plusInput2 = plusInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, plusInput2Edge.source), node.id, plusInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          return plusInput1 + plusInput2;
        }

        case 'minus': {
          const minusInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-1');
          });
          const minusInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const minusInput1 = minusInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, minusInput1Edge.source), node.id, minusInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const minusInput2 = minusInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, minusInput2Edge.source), node.id, minusInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          return minusInput1 - minusInput2;
        }

        case 'multiply': {
          const multiplyInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-1');
          });
          const multiplyInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const multiplyInput1 = multiplyInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, multiplyInput1Edge.source), node.id, multiplyInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const multiplyInput2 = multiplyInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, multiplyInput2Edge.source), node.id, multiplyInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          return multiplyInput1 * multiplyInput2;
        }

        case 'divide': {
          const divideInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-1');
          });
          const divideInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const divideInput1 = divideInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, divideInput1Edge.source), node.id, divideInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const divideInput2 = divideInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, divideInput2Edge.source), node.id, divideInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          return divideInput2 !== 0 ? Math.floor(divideInput1 / divideInput2) : 0;
        }

        case 'random': {
          const randomInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-1');
          });
          const randomInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-2');
          });
          const randomFrom = randomInput1Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, randomInput1Edge.source), node.id, randomInput1Edge.sourceHandle) : (node.data?.value1 || 0);
          const randomTo = randomInput2Edge ? this.evaluateIntegerFromNode(SFR.findNodeById(this.gameState.nodes, randomInput2Edge.source), node.id, randomInput2Edge.sourceHandle) : (node.data?.value2 || 0);
          const minRand = Math.min(randomFrom, randomTo);
          const maxRand = Math.max(randomFrom, randomTo);
          return Math.floor(Math.random() * (maxRand - minRand + 1)) + minRand;
        }

        case 'floatToInt': {
          const floatInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-');
          });
          if (floatInputEdge) {
            const floatSourceNode = SFR.findNodeById(this.gameState.nodes, floatInputEdge.source);
            const floatValue = floatSourceNode ? this.evaluateFloatFromNode(floatSourceNode, node.id, floatInputEdge.sourceHandle) : 0.0;
            return Math.round(floatValue);
          }
          return 0;
        }

        case 'booleanToInt': {
          const boolToIntInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-boolean-');
          });
          if (boolToIntInputEdge) {
            const boolSourceNode = SFR.findNodeById(this.gameState.nodes, boolToIntInputEdge.source);
            const boolValue = boolSourceNode ? this.evaluateBooleanFromNode(boolSourceNode, node.id, boolToIntInputEdge.sourceHandle) : false;
            return boolValue ? 1 : 0;
          }
          return 0;
        }

        case 'stringToInt': {
          const stringToIntInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-');
          });
          if (stringToIntInputEdge) {
            const strSourceNode = SFR.findNodeById(this.gameState.nodes, stringToIntInputEdge.source);
            const stringValue = strSourceNode ? this.evaluateStringFromNode(strSourceNode, node.id, stringToIntInputEdge.sourceHandle) : '';
            return parseInt(stringValue, 10) || 0;
          }
          return 0;
        }

        case 'lengthString': {
          const lengthInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-string-');
          });
          if (lengthInputEdge) {
            const lengthSourceNode = SFR.findNodeById(this.gameState.nodes, lengthInputEdge.source);
            const lengthStringValue = lengthSourceNode ? this.evaluateStringFromNode(lengthSourceNode, node.id, lengthInputEdge.sourceHandle) : '';
            return lengthStringValue.length;
          }
          return 0;
        }

        // Array length nodes - compute directly since these are pure nodes
        case 'arrayLengthBool': {
          const boolArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          return boolArr.length;
        }
        case 'arrayLengthInt': {
          const intArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          return intArr.length;
        }
        case 'arrayLengthFloat': {
          const floatArr = this.getArrayInput(node, 'float-array-1', 'float');
          return floatArr.length;
        }
        case 'arrayLengthString': {
          const strArr = this.getArrayInput(node, 'string-array-1', 'string');
          return strArr.length;
        }
        case 'arrayLengthImage': {
          const imgArr = this.getArrayInput(node, 'image-array-1', 'image');
          return imgArr.length;
        }
        case 'arrayLengthCharacter': {
          const charArr = this.getArrayInput(node, 'character-array-1', 'character');
          return charArr.length;
        }
        case 'arrayLengthAudio': {
          const audioArr = this.getArrayInput(node, 'audio-array-1', 'audio');
          return audioArr.length;
        }

        // Find in array nodes (return index) - compute directly since these are pure nodes
        case 'findInBoolArray': {
          const findBoolArr = this.getArrayInput(node, 'boolean-array-1', 'boolean');
          const findBoolVal = this.getBooleanInput(node, 'boolean-2', typeof node.data?.value === 'boolean' ? node.data.value : false);
          return findBoolArr.indexOf(findBoolVal);
        }
        case 'findInIntArray': {
          const findIntArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          const findIntVal = this.getIntegerInput(node, 'integer-2', typeof node.data?.value === 'number' ? node.data.value : 0);
          return findIntArr.indexOf(findIntVal);
        }
        case 'findInFloatArray': {
          const findFloatArr = this.getArrayInput(node, 'float-array-1', 'float');
          const findFloatVal = this.getFloatInput(node, 'float-2', typeof node.data?.value === 'number' ? node.data.value : 0.0);
          return findFloatArr.indexOf(findFloatVal);
        }
        case 'findInStringArray': {
          const findStrArr = this.getArrayInput(node, 'string-array-1', 'string');
          const findStrVal = this.getStringInput(node, 'string-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findStrArr.indexOf(findStrVal);
        }
        case 'findInImageArray': {
          const findImgArr = this.getArrayInput(node, 'image-array-1', 'image');
          const findImgVal = this.getImageInput(node, 'image-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findImgArr.indexOf(findImgVal);
        }
        case 'findInCharacterArray': {
          const findCharArr = this.getArrayInput(node, 'character-array-1', 'character');
          const findCharVal = this.getCharacterInput(node, 'character-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findCharArr.indexOf(findCharVal);
        }
        case 'findInAudioArray': {
          const findAudioArr = this.getArrayInput(node, 'audio-array-1', 'audio');
          const findAudioVal = this.getAudioInput(node, 'audio-2', typeof node.data?.value === 'string' ? node.data.value : '');
          return findAudioArr.indexOf(findAudioVal);
        }

        // Get integer array element - compute directly since this is a pure node
        case 'getIntArrayElement': {
          const getIntElemArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          const getIntElemIdx = this.getIntegerInput(node, 'integer-2', node.data?.index || 0);
          return (getIntElemIdx >= 0 && getIntElemIdx < getIntElemArr.length) ? getIntElemArr[getIntElemIdx] : 0;
        }

        // Get random integer array element - return element value
        case 'getRandomIntArrayElement': {
          const randIntArr = this.getArrayInput(node, 'integer-array-1', 'integer');
          if (randIntArr.length === 0) return 0;
          // Always generate fresh random for each evaluation
          const randIntIdx = Math.floor(Math.random() * randIntArr.length);
          return randIntArr[randIntIdx];
        }

        // ForEach loop index
        case 'forEachBoolLoop':
        case 'forEachIntLoop':
        case 'forEachFloatLoop':
        case 'forEachStringLoop':
        case 'forEachImageLoop':
        case 'forEachCharacterLoop':
        case 'forEachAudioLoop':
          // Return current index if sourceHandle indicates index output
          if (sourceHandle && sourceHandle.includes('-index')) {
            return node.data?._currentIndex || 0;
          }
          // Otherwise return element value (handled in element type evaluator)
          return node.data?.outputValue || 0;

        case 'runScript': {
          if (!node.data || !node.data._outputValues) return 0;
          var outMatch = sourceHandle ? sourceHandle.match(/-out-(.+)$/) : null;
          if (!outMatch) return 0;
          var outData = node.data._outputValues[outMatch[1]];
          if (!outData) return 0;
          return parseInt(outData.value, 10) || 0;
        }

        default:
          return 0;
      }
    },

    evaluateFloatFromNode: function(node, targetNodeId, sourceHandle) {

      switch (node.type) {
        case 'dialogue': {

          }
          return 0.0;
        }

        case 'getCharacterVar':

            const characterPath = this.getCharacterInput(node, 'character-character-input', node.data.characterPath || '');
            const value = SFR.getCharacterVariableValue(
              characterPath,
              node.data.variableName,
              'float'

          }

        }

            const variable = SFR.findVariableByName(variableArray, node.data.variableName);
            return variable ? parseFloat(variable.value) : 0.0;
          }
          return 0.0;
        }

        case 'plusFloat': {
          const plusInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const plusInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const plusInput1 = plusInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, plusInput1Edge.source), node.id, plusInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const plusInput2 = plusInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, plusInput2Edge.source), node.id, plusInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return new Big(plusInput1).plus(plusInput2).toNumber();
        }

        case 'minusFloat': {
          const minusInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const minusInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const minusInput1 = minusInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, minusInput1Edge.source), node.id, minusInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const minusInput2 = minusInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, minusInput2Edge.source), node.id, minusInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return new Big(minusInput1).minus(minusInput2).toNumber();
        }

        case 'multiplyFloat': {
          const multiplyInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const multiplyInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const multiplyInput1 = multiplyInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, multiplyInput1Edge.source), node.id, multiplyInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const multiplyInput2 = multiplyInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, multiplyInput2Edge.source), node.id, multiplyInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return new Big(multiplyInput1).times(multiplyInput2).toNumber();
        }

        case 'divideFloat': {
          const divideInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const divideInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const divideInput1 = divideInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, divideInput1Edge.source), node.id, divideInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const divideInput2 = divideInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, divideInput2Edge.source), node.id, divideInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          return divideInput2 !== 0 ? new Big(divideInput1).div(divideInput2).toNumber() : 0.0;
        }

        case 'randomFloat': {
          const randomInput1Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-1');
          });
          const randomInput2Edge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-float-2');
          });
          const randomFrom = randomInput1Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, randomInput1Edge.source), node.id, randomInput1Edge.sourceHandle) : (node.data?.value1 || 0.0);
          const randomTo = randomInput2Edge ? this.evaluateFloatFromNode(SFR.findNodeById(this.gameState.nodes, randomInput2Edge.source), node.id, randomInput2Edge.sourceHandle) : (node.data?.value2 || 0.0);
          const minRand = Math.min(randomFrom, randomTo);
          const maxRand = Math.max(randomFrom, randomTo);
          // Use Big for range calculation to maintain precision
          const range = new Big(maxRand).minus(minRand);
          return new Big(minRand).plus(range.times(Math.random())).toNumber();
        }

        case 'intToFloat': {
          const intInputEdge = this.gameState.edges.find(function(edge) {
            return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-integer-');
          });
          if (intInputEdge) {
            const intSourceNode = SFR.findNodeById(this.gameState.nodes, intInputEdge.source);
            const intValue = intSourceNode ? this.evaluateIntegerFromNode(intSourceNode, node.id, intInputEdge.sourceHandle) : 0;

          }

    // ============================================================================
    // BOOLEAN CHAIN PROCESSING
    // ============================================================================

    processBooleanChain: function(node) {
      if (!node || !SFR.ALL_BOOLEAN_PRODUCERS.includes(node.type)) {
        return;
      }

      if (node.type === 'notBool') {
        if (node.data) delete node.data.outputValue;
        // Use helper to find input edge, then traverse the chain
        const inputEdge = this.findInputEdge(node, 'boolean');
        if (inputEdge) {
          const sourceNode = SFR.findNodeById(this.gameState.nodes, inputEdge.source);
          if (sourceNode) this.processBooleanChain(sourceNode);
        }
        this.processNotBoolNode(node);
      } else if (node.type === 'branch') {
        // Use helper to find condition edge
        const conditionEdge = this.findInputEdge(node, 'boolean-condition');
        if (conditionEdge) {
          const branchSourceNode = SFR.findNodeById(this.gameState.nodes, conditionEdge.source);
          if (branchSourceNode) this.processBooleanChain(branchSourceNode);
        }
      } else if (node.type === 'andBool' || node.type === 'orBool' || node.type === 'equalBool') {
        // Use helpers to find both input edges
        const input1Edge = this.findInputEdge(node, 'boolean-1');
        const input2Edge = this.findInputEdge(node, 'boolean-2');
        if (input1Edge) {
          const source1Node = SFR.findNodeById(this.gameState.nodes, input1Edge.source);
          if (source1Node) this.processBooleanChain(source1Node);
        }
        if (input2Edge) {
          const source2Node = SFR.findNodeById(this.gameState.nodes, input2Edge.source);
          if (source2Node) this.processBooleanChain(source2Node);
        }
      } else if (SFR.BOOLEAN_NODE_TYPES.INTEGER_COMPARISON.includes(node.type)) {
        const intInputs = this.getIntegerInputValues(node, 'integer-1', 'integer-2');
        let intResult = false;
        switch (node.type) {
          case 'greaterThan':         intResult = intInputs.input1 > intInputs.input2; break;
          case 'greaterThanOrEqual':  intResult = intInputs.input1 >= intInputs.input2; break;
          case 'lessThan':            intResult = intInputs.input1 < intInputs.input2; break;
          case 'lessThanOrEqual':     intResult = intInputs.input1 <= intInputs.input2; break;
          case 'equalInt':            intResult = intInputs.input1 === intInputs.input2; break;
        }
        this.setNodeOutputValue(node, intResult);
      } else if (SFR.BOOLEAN_NODE_TYPES.FLOAT_COMPARISON.includes(node.type)) {
        const floatInputs = this.getFloatInputValues(node, 'float-1', 'float-2');
        const big1 = new Big(floatInputs.input1);
        const big2 = new Big(floatInputs.input2);

						var variable = SFR.findVariableByName(variableArray, sourceNode.data.variableName)
						if (variable) {
							variable.value = []
							if (isGlobal) {
								this.gameState.dispatch({ type: 'UPDATE_GLOBAL_VARIABLES', payload: variableArray })
							} else {
								this.gameState.dispatch({ type: 'UPDATE_VARIABLES', payload: variableArray })
							}
						}
					}
				}
			}
		},

		/**
		 * Update the array variable connected to a specific input handle.
		 */
		updateConnectedArrayVariable: function (node, handleSuffix, newArray) {
			var edge = this.findInputEdge(node, handleSuffix)
			if (!edge) return

			var sourceNode = SFR.findNodeById(this.gameState.nodes, edge.source)
			if (!sourceNode || !SFR.isValidNodeData(sourceNode.data)) return

			// Handle character variable arrays
			if ((sourceNode.type === 'getCharacterVar' || sourceNode.type === 'setCharacterVar') && sourceNode.data.isArray === true) {
				// First check for connected character input handle, then fall back to dropdown value
				var charPath = this.getCharacterInput(sourceNode, 'character-character-input', sourceNode.data.characterPath || '')
				SFR.setCharacterVariableValue(
					charPath,
					sourceNode.data.variableName,
					sourceNode.data.variableType,
					newArray
				)
				return
			}

			// Handle local/global script variable arrays
			var isGlobal = sourceNode.data.isGlobal === true
			var variableArray = isGlobal ? this.gameState.globalVariables.slice() : this.gameState.variables.slice()
			var variable = SFR.findVariableByName(variableArray, sourceNode.data.variableName)
			if (!variable) return

			variable.value = newArray

			if (isGlobal) {
				this.gameState.dispatch({ type: 'UPDATE_GLOBAL_VARIABLES', payload: variableArray })
			} else {
				this.gameState.dispatch({ type: 'UPDATE_VARIABLES', payload: variableArray })
			}
		},

		// ============================================================================
		// LOOP HELPERS
		// ============================================================================

		/**
		 * Process a forEach loop node.
		 */
		processForEachLoop: function (node, elementType) {
			if (!node.data) node.data = {}

			// Initialize loop if needed
			if (node.data._loopIndex === undefined) {
				var arr = this.getArrayInput(node, elementType + '-array', elementType)
				node.data._loopArray = arr
				node.data._loopIndex = 0
			}

			var currentIndex = node.data._loopIndex
			var loopArray = node.data._loopArray || []

			if (currentIndex < loopArray.length) {
				// Set current element and index as outputs
				var element = loopArray[currentIndex]
				this.setNodeOutputValue(node, element)
				node.data._currentIndex = currentIndex

				// Push loop context for break support
				this.pushLoopContext(node.id, 'forEach')

				// Execute loop body
				this.processNextNode('source-' + node.id + '-loopBody')
			} else {
				// Loop completed - clean up
				delete node.data._loopIndex
				delete node.data._loopArray
				delete node.data._currentIndex
				this.processNextNode('source-' + node.id + '-completed')
			}
		},

		/**
		 * Continue to the next iteration of a loop.
		 * Called when loop body execution completes and reaches back to the loop.
		 */
		continueLoop: function (nodeId) {
			var node = SFR.findNodeById(this.gameState.nodes, nodeId)
			if (!node || node.data._loopIndex === undefined) return

			// Increment loop index
			node.data._loopIndex++

			// Pop the loop context that was pushed for this iteration
			this.popLoopContext()

			// Re-process the loop node to continue
			this.processNode(node)
		},

		/**
		 * Push a loop context onto the loop stack.
		 */
		pushLoopContext: function (nodeId, loopType) {
			if (!this.gameState.loopStack) {
				this.gameState.loopStack = []
			}
			this.gameState.loopStack.push({ nodeId: nodeId, loopType: loopType })
		},

		/**
		 * Pop the current loop context from the stack.
		 */
		popLoopContext: function () {
			if (!this.gameState.loopStack || this.gameState.loopStack.length === 0) {
				return null
			}
			return this.gameState.loopStack.pop()
		},

		/**
		 * Get the current loop context without removing it.
		 */
		peekLoopContext: function () {
			if (!this.gameState.loopStack || this.gameState.loopStack.length === 0) {
				return null
			}
			return this.gameState.loopStack[this.gameState.loopStack.length - 1]
		},

		// ============================================================================
		// GENERIC OPERATION PROCESSORS
		// ============================================================================

		processIntegerComparison: function (node, operator) {
			const inputs = this.getIntegerInputValues(node, 'integer-1', 'integer-2')

			let result = false
			switch (operator) {
				case 'gt':
					result = inputs.input1 > inputs.input2
					break
				case 'gte':
					result = inputs.input1 >= inputs.input2
					break
				case 'lt':
					result = inputs.input1 < inputs.input2
					break
				case 'lte':
					result = inputs.input1 <= inputs.input2
					break
				case 'eq':
					result = inputs.input1 === inputs.input2
					break
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-boolean-')
		},

		processIntegerArithmetic: function (node, operator) {
			const inputs = this.getIntegerInputValues(node, 'integer-1', 'integer-2')

			let result
			switch (operator) {
				case 'add':
					result = inputs.input1 + inputs.input2
					break
				case 'subtract':
					result = inputs.input1 - inputs.input2
					break
				case 'multiply':
					result = inputs.input1 * inputs.input2
					break
				case 'divide':
					result = inputs.input2 !== 0 ? Math.floor(inputs.input1 / inputs.input2) : 0
					break
				case 'random': {
					const min = Math.min(inputs.input1, inputs.input2)
					const max = Math.max(inputs.input1, inputs.input2)
					result = Math.floor(Math.random() * (max - min + 1)) + min
					break
				}
				default:
					result = 0
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-integer-')
		},

		processFloatComparison: function (node, operator) {
			const inputs = this.getFloatInputValues(node, 'float-1', 'float-2')
			const big1 = new Big(inputs.input1)
			const big2 = new Big(inputs.input2)

			let result = false
			switch (operator) {
				case 'gt':
					result = big1.gt(big2)
					break
				case 'gte':
					result = big1.gte(big2)
					break
				case 'lt':
					result = big1.lt(big2)
					break
				case 'lte':
					result = big1.lte(big2)
					break
				case 'eq':
					result = big1.eq(big2)
					break
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-boolean-')
		},

		processFloatArithmetic: function (node, operator) {
			const inputs = this.getFloatInputValues(node, 'float-1', 'float-2')
			const big1 = new Big(inputs.input1)
			const big2 = new Big(inputs.input2)

			let result
			switch (operator) {
				case 'add':
					result = big1.plus(big2).toNumber()
					break
				case 'subtract':
					result = big1.minus(big2).toNumber()
					break
				case 'multiply':
					result = big1.times(big2).toNumber()
					break
				case 'divide':
					result = inputs.input2 !== 0 ? big1.div(big2).toNumber() : 0.0
					break
				case 'random': {
					const minFloat = Math.min(inputs.input1, inputs.input2)
					const maxFloat = Math.max(inputs.input1, inputs.input2)
					const range = new Big(maxFloat).minus(minFloat)
					result = new Big(minFloat).plus(range.times(Math.random())).toNumber()
					break
				}
				default:
					result = 0.0
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-float-')
		},

		processBooleanOperation: function (node, operation) {
			const inputs = this.getBooleanInputValues(node, 'boolean-1', 'boolean-2')

			let result = false
			switch (operation) {
				case 'and':
					result = inputs.input1 && inputs.input2
					break
				case 'or':
					result = inputs.input1 || inputs.input2
					break
				case 'equal':
					result = inputs.input1 === inputs.input2
					break
			}

			this.setNodeOutputValue(node, result)
			this.processNextNode('source-' + node.id + '-1')
		},

		// ============================================================================
		// NODE HANDLERS
		// ============================================================================

		getNodeHandlers: function () {
			const self = this

			return {
				end: function () {
					var exitFlowId = null

					// Pop flow call stack for depth tracking
					// Check if the popped flow is an exit route
					if (self.gameState.flowCallStack && self.gameState.flowCallStack.length > 0) {
						var flowFrame = self.popFlowCallStack()
						if (flowFrame && flowFrame.flowId && self.gameState.callStack.length > 0) {
							var flows = self.gameState.flows || []
							var flow = null
							for (var fi = 0; fi < flows.length; fi++) {
								if (flows[fi].id === flowFrame.flowId) {
									flow = flows[fi]
									break
								}
							}
							if (flow && flow.isExit) {
								exitFlowId = flowFrame.flowId
							}
						}
					}

					// Check script call stack
					if (self.gameState.callStack.length > 0) {
						// If exit flow, check if exit handle is connected in calling script BEFORE popping
						if (exitFlowId) {
							var topFrame = self.gameState.callStack[self.gameState.callStack.length - 1]
							var exitHandle = 'source-' + topFrame.returnNodeId + '-exit-' + exitFlowId
							if (!SFR.findEdgeBySourceHandle(topFrame.edges, exitHandle)) {
								// Exit handle not connected — don't exit, stay in called script
								return
							}
						}

						// Gather output variable values BEFORE popping (still in called script)
						var outputValues = {}
						var vars = self.gameState.variables
						for (var oi = 0; oi < vars.length; oi++) {
							if (vars[oi].isOutput) {
								outputValues[vars[oi].id] = { value: vars[oi].value, type: vars[oi].type }
							}
						}

						var callFrame = self.popCallStack()

						if (callFrame) {
							// Store outputs on the RunScript node in the restored calling script
							var rsNode = SFR.findNodeById(self.gameState.nodes, callFrame.returnNodeId)
							if (rsNode) {
								if (!rsNode.data) rsNode.data = {}
								rsNode.data._outputValues = outputValues
							}

							// Route: exit handle if exit flow, otherwise default output
							var handle = exitFlowId
								? 'source-' + callFrame.returnNodeId + '-exit-' + exitFlowId
								: 'source-' + callFrame.returnNodeId + '-output'

							if (SFR.findEdgeBySourceHandle(self.gameState.edges, handle)) {
								self.processNextNode(handle)
							}
						} else {
							console.error('Failed to pop call stack')
							SFR.closeWindow()
						}
					} else {
						self.gameState.dispatch({ type: 'SET_BACKGROUND_IMAGE', payload: null })
						self.gameState.dispatch({ type: 'SET_AUDIO', payload: null })
						self.gameState.dispatch({ type: 'SET_CHARACTER', payload: null })
						SFR.closeWindow()
					}
				},

				dialogue: function (node) {
					// Check if we're inside a loop body - dialogue nodes cannot be used in loops
					const loopContext = self.peekLoopContext()
					if (loopContext && loopContext.loopType === 'forEach') {
						self.gameState.dispatch({
							type: 'SET_ERROR',
							payload: 'Dialogue nodes can\'t be inside ForEach loops'
						})
						return
					}

					// Reconstruct unified options array from the 3 separate arrays (new format)
					// Also handles legacy format where options has optionType field
					let nodeOptions
					const hasNewFormat = node.data?.textBlocks || node.data?.elements
					if (hasNewFormat) {
						// New format: merge textBlocks, elements, options into unified array
						nodeOptions = []
						if (node.data.textBlocks) {
							node.data.textBlocks.forEach(function(tb) {
								nodeOptions.push({ ...tb, optionType: 'text' })
							})
						}
						if (node.data.elements) {
							node.data.elements.forEach(function(el) {
								nodeOptions.push({ ...el, optionType: 'input' })
							})
						}
						if (node.data.options) {
							node.data.options.forEach(function(opt) {
								nodeOptions.push(opt) // buttons have no optionType (default)
							})
						}
					} else {
						// Legacy format or empty: use options directly
						nodeOptions = node.data?.options || []
					}
					const nodeText = SFR.safeGetStringFromNodeData(node.data, 'text', SFR.DEFAULT_TEXT.NO_TEXT)
					const nodeImageReset = node.data?.imageReset || false
					const nodeAudioLoop = node.data?.audioLoop || false
					const nodeAudioReset = node.data?.audioReset || false
					const nodeAudioAdvanceOnEnd = node.data?.audioAdvanceOnEnd || false
					const nodeAudioAllowSkip = node.data?.audioAllowSkip || false

					// Check how we entered this dialogue:
					// - Via edge (processNextNode sets _enteringViaEdge): fresh entry, evaluate all inputs
					// - Direct call (processNode without edge): returning after button/input handler, use cached values
					const isFreshEntry = self.gameState._enteringViaEdge === true
					if (isFreshEntry) {
						self.gameState._enteringViaEdge = false
					}

					// Get image: evaluate fresh on new entry, use cached value when returning
					let nodeImage
					if (!isFreshEntry && node.data?._cachedImage !== undefined) {
						nodeImage = node.data._cachedImage
					} else {
						const dropdownImage = SFR.safeGetStringFromNodeData(node.data, 'image', '')
						nodeImage = self.getImageInput(node, 'image-image-ref', dropdownImage)
					}

					// Get audio: evaluate fresh on new entry, use cached value when returning
					let nodeAudio
					if (!isFreshEntry && node.data?._cachedAudio !== undefined) {
						nodeAudio = node.data._cachedAudio
					} else {
						const dropdownAudio = SFR.safeGetStringFromNodeData(node.data, 'audio', '')
						nodeAudio = self.getAudioInput(node, 'audio-audio-ref', dropdownAudio)
					}

					// Get character: evaluate fresh on new entry, use cached value when returning
					let nodeCharacter
					if (!isFreshEntry && node.data?._cachedCharacter !== undefined) {
						nodeCharacter = node.data._cachedCharacter
					} else {
						const dropdownCharacter = SFR.safeGetStringFromNodeData(node.data, 'character', '')
						nodeCharacter = self.getCharacterInput(node, 'character-character-ref', dropdownCharacter)
					}

					// Cache the evaluated values so dialogue outputs return the displayed values
					if (!node.data) node.data = {}
					node.data._cachedImage = nodeImage
					node.data._cachedAudio = nodeAudio
					node.data._cachedCharacter = nodeCharacter

					nodeOptions.forEach(function (option) {
						const edge = self.gameState.edges.find(function (e) {
							return e.target === node.id && e.targetHandle?.includes(option.id)
						})
						if (edge) {
							const sourceNode = SFR.findNodeById(self.gameState.nodes, edge.source)
							if (sourceNode) self.processBooleanChain(sourceNode)
						}
					})

					if (nodeImage && nodeImage.trim() !== '') {
						self.gameState.dispatch({ type: 'SET_BACKGROUND_IMAGE', payload: nodeImage })
					} else if (nodeImageReset) {
						self.gameState.dispatch({ type: 'SET_BACKGROUND_IMAGE', payload: null })
					}

					if (nodeAudio && nodeAudio.trim() !== '') {
						self.gameState.dispatch({ type: 'SET_AUDIO', payload: { path: nodeAudio, loop: nodeAudioLoop, advanceOnEnd: nodeAudioAdvanceOnEnd, allowSkip: nodeAudioAllowSkip } })
					} else if (nodeAudioReset) {
						self.gameState.dispatch({ type: 'SET_AUDIO', payload: null })
					}
					// If no audio AND audioReset is false, keep previous audio playing (do nothing)

					if (nodeCharacter && nodeCharacter.trim() !== '') {
						SFR.loadCharacterData(nodeCharacter).then(function (characterData) {
							self.gameState.dispatch({ type: 'SET_CHARACTER', payload: characterData })
						})
					} else {
						self.gameState.dispatch({ type: 'SET_CHARACTER', payload: null })
					}

					self.gameState.dispatch({
						type: 'SET_DIALOGUE',
						payload: {
							node: node,
							rawText: nodeText,
							rawOptions: nodeOptions,
							text: nodeText,
							options: nodeOptions,
						},
					})
				},

				setBool: function (node) {
					self.updateVariable(node)
					const sourceHandle = node.id + '-1'
					const nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, sourceHandle)
					if (nextEdge) {
						self.processNextNode(sourceHandle)
						return
					}
					// No outgoing edge - check for special cases
					// First: If we're in a forEach loop body, continue the loop
					const loopContext = self.peekLoopContext()
					if (loopContext && loopContext.loopType === 'forEach') {
						self.continueLoop(loopContext.nodeId)
						return
					}
					// Second: If we came from a dialogue, go back to re-render it
					const incomingEdge = self.gameState.edges.find(function (edge) {
						return edge.target === node.id
					})
					if (incomingEdge) {
						const sourceNode = SFR.findNodeById(self.gameState.nodes, incomingEdge.source)
						if (sourceNode?.type === 'dialogue') {
							self.processNode(sourceNode)
						}
					}
				},

				getBool: function (node) {
					self.processNextNode(node.id + '-1')
				},

				notBool: function (node) {
					// Use helper to automatically handle sourceHandle for dialogue inputs
					const inputValue = self.getBooleanInput(node, 'boolean', false)
					if (!node.data) node.data = {}
					node.data.outputValue = !inputValue
					self.processNextNode(node.id + '-1')
				},

				branch: function (node) {
					let conditionValue = false

					// Use helper to find the condition edge
					const conditionEdge = self.findInputEdge(node, 'boolean-condition')

					if (conditionEdge) {
						const sourceNode = SFR.findNodeById(self.gameState.nodes, conditionEdge.source)
						if (sourceNode) {
							// Process boolean chain to ensure output values are computed
							self.processBooleanChain(sourceNode)
							// Evaluate with sourceHandle for correct dialogue input resolution
							conditionValue = self.evaluateBooleanFromNode(sourceNode, node.id, conditionEdge.sourceHandle)
						}
					} else if (typeof node.data?.value === 'boolean') {
						conditionValue = node.data.value
					}

					const outputHandle = conditionValue ? 'source-' + node.id + '-true' : 'source-' + node.id + '-false'
					self.processNextNode(outputHandle)
				},

				andBool: function (node) {
					self.processBooleanOperation(node, 'and')
				},
				orBool: function (node) {
					self.processBooleanOperation(node, 'or')

				runScript: function (node) {
					const scriptValue = SFR.safeGetStringFromNodeData(node.data, 'value')
					if (!scriptValue.trim()) {
						console.warn('RunScript node has no script selected')
						return
					}

					const circularCheck = self.checkCircularDependency(scriptValue)
					if (circularCheck.isCircular) {
						console.error('Circular dependency detected:', circularCheck.error)
						self.gameState.dispatch({ type: 'SET_ERROR', payload: circularCheck.error })
						return
					}

					// Evaluate parameter values while still in calling script's context
					var paramValues = {}
					var si = node.data?.scriptInterface
					if (si?.parameters) {
						for (var i = 0; i < si.parameters.length; i++) {
							var p = si.parameters[i]
							var val = self.getTypedInput(node, p.type + '-param-' + p.id, p.type)
							if (val !== undefined) {
								paramValues[p.id] = { value: val, type: p.type }
							}
						}
					}

					self.pushCallStack(node.id, paramValues)

					if (SFR.isStandalone()) {
						self.handleScriptSwitch(scriptValue)
					} else {
						window?.electron?.ipcRenderer?.send('run-script', scriptValue, self.gameState.globalVariables)
					}
				},

					const dropdownValue = SFR.safeGetStringFromNodeData(node.data, 'value')

					const nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, sourceHandle)
					if (nextEdge) {
						self.processNextNode(sourceHandle)
					}

					const audioValue = self.getAudioInput(node, 'audio-audio-input', dropdownValue)

					const sourceHandle = 'source-' + node.id + '-output'
					const nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, sourceHandle)
					if (nextEdge) {
						self.processNextNode(sourceHandle)
					}
				},

				randomBranch: function (node) {
					var options = node.data?.options || node.options
					if (!options || options.length === 0) {
						console.warn('randomBranch: No options defined')
						return
					}

					// Calculate total weight (resolve connected integer handles per option)
					var totalWeight = 0
					var resolvedWeights = []
					for (var i = 0; i < options.length; i++) {
						var w = self.getIntegerInput(node, 'integer-' + options[i].id, options[i].weight != null ? options[i].weight : 1)
						if (w < 0) w = 0
						resolvedWeights.push(w)
						totalWeight += w
					}

					// Pick a random value in [0, totalWeight)
					var roll = Math.random() * totalWeight
					var cumulative = 0
					var selectedOption = options[0]
					for (var j = 0; j < options.length; j++) {
						cumulative += resolvedWeights[j]
						if (roll < cumulative) {
							selectedOption = options[j]
							break
						}
					}

					var outputHandle = 'source-' + node.id + '-' + selectedOption.id
					var nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, outputHandle)
					if (nextEdge) {
						self.processNextNode(outputHandle)
					} else {
						console.warn('randomBranch: No edge connected to selected output')
					}

					const variable = SFR.findVariableByName(variableArray, node.data?.variableName)
					const enumValue = variable ? String(variable.value) : ''

					const nextEdge = SFR.findEdgeBySourceHandle(self.gameState.edges, outputHandle)

					}

					if (circularCheck.isCircular) {

						return
					}

					// Special case: calling the main "Start" flow

						// (same as how the runtime initializes)

						}
						const firstNode = SFR.findNodeById(self.gameState.nodes, startingEdge.target)

							const errorMsg = 'Start node connects to missing node'
							console.error(errorMsg)
							self.gameState.dispatch({ type: 'SET_ERROR', payload: errorMsg })
							return
						}
						// Track flow depth for recursion protection (after validation)
						self.pushFlowCallStack(flowId)
						self.processNode(firstNode)
					} else {
						// Check if this is an exit flow (no entryFlow node - it's a termination signal)
						var flows = self.gameState.flows || []
						var flowDef = null
						for (var fIdx = 0; fIdx < flows.length; fIdx++) {
							if (flows[fIdx].id === flowId) {
								flowDef = flows[fIdx]
								break
							}
						}

						if (flowDef && flowDef.isExit) {
							// Exit flow: push onto flowCallStack so the end handler detects it,
							// then trigger end logic directly
							self.pushFlowCallStack(flowId)
							var handlers = self.getNodeHandlers()
							handlers.end()
							return
						}

						// Find the entryFlow node for this flow
						var targetNode = self.gameState.nodes.find(function (n) {
							return n.type === 'entryFlow' && n.data?.flowId === flowId
						})
						if (!targetNode) {
							const errorMsg = 'Flow "' + (node.data?.flowName || flowId) + '" not found'
							console.error(errorMsg)
							self.gameState.dispatch({ type: 'SET_ERROR', payload: errorMsg })
							return
						}
						// Track flow depth for recursion protection (after validation)
						self.pushFlowCallStack(flowId)
						// Jump to the flow
						self.processNode(targetNode)
					}

      // First check for connected character input handle, then fall back to dropdown value
      const dropdownPath = node.data.characterPath || '';
      const characterPath = this.getCharacterInput(node, 'character-character-input', dropdownPath);

      if (!characterPath) {
        console.warn('updateCharacterVariable: No character path available');
        return;
      }

      const variableName = node.data.variableName;
      const variableType = node.data.variableType || 'string';
      const isArray = node.data.isArray === true;

      // Determine the value to set - check for connected input edge first
      let newValue;
      // Handle suffix is different for arrays vs scalars
      const inputHandleSuffix = isArray ? (variableType + '-array-input') : (variableType + '-input');
      const inputEdge = this.gameState.edges.find(function(edge) {
        return edge.target === node.id && edge.targetHandle?.includes('target-' + node.id + '-' + inputHandleSuffix);
      });

      if (inputEdge) {
        // Get value from connected node
        const sourceNode = SFR.findNodeById(this.gameState.nodes, inputEdge.source);
        if (sourceNode) {
          if (isArray) {
            // For arrays, use evaluateArrayFromNode
            newValue = this.evaluateArrayFromNode(sourceNode, variableType);
          } else {
            // For scalars, use type-specific evaluator
            switch (variableType) {
              case 'boolean':
                newValue = this.evaluateBooleanFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'integer':
                newValue = this.evaluateIntegerFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'float':
                newValue = this.evaluateFloatFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'enum':
                newValue = this.evaluateEnumFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'image':
                newValue = this.evaluateImageFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'character':
                newValue = this.evaluateCharacterFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'audio':
                newValue = this.evaluateAudioFromNode(sourceNode, node.id, inputEdge?.sourceHandle);
                break;
              case 'string':
              default:
                newValue = this.evaluateStringFromNode(sourceNode, node.id, inputEdge?.sourceHandle);

          newValue = node.data.value;

        newValue = node.data.value;

      // Set the character variable value
      SFR.setCharacterVariableValue(characterPath, variableName, variableType, newValue);

      // If we just set the Name field and there's a current character displayed, update gameState
      if (variableName === 'Name' && this.gameState.character && this.gameState.character.characterPath) {
        // Normalize paths for comparison
        const currentPath = this.gameState.character.characterPath.toLowerCase().replace(/\//g, '\\');
        const updatedPath = characterPath.replace(/\\/g, '/').trim().replace(/^\/+/, '').toLowerCase().replace(/\//g, '\\');

        if (currentPath === updatedPath) {
          // Update the displayed character name to reflect the change
          this.gameState.dispatch({

        }

      // If we just set the Image field and there's a current character displayed, reload to update image
      if (variableName === 'Image' && this.gameState.character && this.gameState.character.characterPath) {
        // Normalize paths for comparison
        const currentPath = this.gameState.character.characterPath.toLowerCase().replace(/\//g, '\\');
        const updatedPath = characterPath.replace(/\\/g, '/').trim().replace(/^\/+/, '').toLowerCase().replace(/\//g, '\\');

          var self = this;
          SFR.loadCharacterData(characterPath).then(function(characterData) {

    // ============================================================================

    handleScriptSwitch: function(scriptValue) {

      if (this.gameState.allScripts[normalizedPath]) {
        this.gameState.dispatch({
          type: 'SWITCH_SCRIPT',
          payload: { scriptPath: normalizedPath }

      edges: this.gameState.edges.slice(),
      variables: this.gameState.variables.slice(),
      flows: this.gameState.flows.slice(), // Save flows
      flowCallStack: this.gameState.flowCallStack.slice(), // Save flow state
      paramValues: paramValues || null, // Store param values for the called script

  StoryFlowEditor.prototype.popCallStack = function() {

      return null;

    // Restore flow stack from calling script
    this.gameState.flowCallStack = callFrame.flowCallStack || [];

    this.gameState.setState({
      currentScriptPath: callFrame.scriptPath,
      nodes: callFrame.nodes,
      edges: callFrame.edges,

  StoryFlowEditor.prototype.applyParameterValues = function(paramValues) {

    for (var i = 0; i < paramIds.length; i++) {

      var paramData = paramValues[varId];

      // Find matching variable by ID in the called script's variables
      var variable = null;
      for (var j = 0; j < variables.length; j++) {

      // Use composite key (nodeId-optionId) to handle copied nodes with same option IDs
      const optionKey = self.gameState.currentDialogue.id + '-' + option.id;
      if (option.onceOnly && self.gameState.clickedOnceOnlyOptions.has(optionKey)) {
        return false;
      }

      // Use helper to find the condition edge for this option
      const conditionEdge = self.findInputEdge(self.gameState.currentDialogue, 'boolean-' + option.id);

      if (conditionEdge) {
        const sourceNode = SFR.findNodeById(self.gameState.nodes, conditionEdge.source);

          self.processBooleanChain(sourceNode);

  StoryFlowEditor.prototype.handleOptionClick = function(optionId) {

    // Use composite key (nodeId-optionId) to handle copied nodes with same option IDs
    const clickedOption = this.gameState.options.find(function(opt) {
      return opt.id === optionId;

    if (clickedOption && clickedOption.onceOnly) {

  StoryFlowEditor.prototype.handleInputValueChange = function(optionId, value, inputType) {

    // For conversion nodes connected to the Value output, process the chain
    if (valueEdge) {

        // SET nodes will get the value when executed via flow
        const isSetNode = targetNode.type === 'setString' || targetNode.type === 'setInt' ||
                          targetNode.type === 'setFloat' || targetNode.type === 'setEnum' ||
                          targetNode.type === 'setBool';

  /**

   * @param {Set} visited - Set of visited node IDs to prevent infinite loops

  StoryFlowEditor.prototype.processInputValueChain = function(node, sourceEdge, visited) {
    if (!node) return;

    // Initialize visited set on first call, check for cycles
    visited = visited || new Set();

      case 'stringToFloat':
        outputValue = this.evaluateFloatFromNode(node);
        outputType = 'float';
        break;
      // Integer conversions
      case 'intToString':
        outputValue = this.evaluateStringFromNode(node);
        outputType = 'string';
        break;
      case 'intToFloat':
        outputValue = this.evaluateFloatFromNode(node);
        outputType = 'float';
        break;
      case 'intToBoolean':
        outputValue = this.evaluateBooleanFromNode(node);
        outputType = 'boolean';
        break;
      // Float conversions
      case 'floatToInt':
        outputValue = this.evaluateIntegerFromNode(node);
        outputType = 'integer';
        break;
      case 'floatToString':
        outputValue = this.evaluateStringFromNode(node);
        outputType = 'string';
        break;
      case 'floatToBoolean':
        outputValue = this.evaluateBooleanFromNode(node);
        outputType = 'boolean';
        break;
      // Boolean conversions
      case 'booleanToInt':
        outputValue = this.evaluateIntegerFromNode(node);
        outputType = 'integer';
        break;
      case 'booleanToFloat':
        outputValue = this.evaluateFloatFromNode(node);
        outputType = 'float';
        break;
      // Enum conversions
      case 'enumToString':
        outputValue = this.evaluateStringFromNode(node);
        outputType = 'string';
        break;
      case 'intToEnum':
        outputValue = this.evaluateEnumFromNode(node);
        outputType = 'enum';
        break;
      case 'stringToEnum':
        outputValue = this.evaluateEnumFromNode(node);
        outputType = 'enum';
        break;
      default:
        return; // Unknown node type, stop processing

    var outputHandlePrefix = 'source-' + node.id + '-' + outputType;
    var outputEdge = this.gameState.edges.find(function(edge) {
      return edge.source === node.id && edge.sourceHandle && edge.sourceHandle.includes(outputHandlePrefix);
    });

    if (outputEdge) {
      var nextNode = SFR.findNodeById(this.gameState.nodes, outputEdge.target);
      if (nextNode) {
        // Do NOT directly update SET nodes - they should only execute via flow
        var isSetNode = nextNode.type === 'setString' || nextNode.type === 'setInt' ||
                        nextNode.type === 'setFloat' || nextNode.type === 'setEnum' ||
                        nextNode.type === 'setBool';

        if (!isSetNode) {
          // Continue processing the chain (pass visited set for cycle detection)
          this.processInputValueChain(nextNode, outputEdge, visited);
        }

      }
    }

  /**
   * Update only the text display with re-interpolated variables
   * Called during input changes to avoid full re-render

  StoryFlowEditor.prototype.updateTextDisplayOnly = function() {
    const allVariables = [].concat(this.gameState.globalVariables || []).concat(this.gameState.variables || []);
    const charvarDataMap = SFR.buildCharvarDataMap(allVariables);
    const interpolatedText = this.gameState.rawText ? SFR.interpolateVariables(this.gameState.rawText, allVariables, this.gameState.character, charvarDataMap) : this.gameState.text;
    this.textDisplay.textContent = interpolatedText;

  // ============================================================================

  // ============================================================================

  StoryFlowEditor.prototype.render = function(state) {
